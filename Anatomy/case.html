<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroAnatomy CBL Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
:root {
--bg-primary: #f0f4f8;
--bg-secondary: #ffffff;
--bg-tertiary: #e8eef4;
--bg-card: #ffffff;
--text-primary: #1a2332;
--text-secondary: #4a5568;
--text-muted: #718096;
--accent-primary: #2563eb;
--accent-secondary: #3b82f6;
--accent-glow: rgba(37, 99, 235, 0.15);
--accent-green: #10b981;
--accent-red: #ef4444;
--accent-orange: #f59e0b;
--accent-purple: #8b5cf6;
--accent-teal: #14b8a6;
--border-color: #e2e8f0;
--border-light: #f1f5f9;
--shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
--shadow-md: 0 4px 12px rgba(0,0,0,0.08);
--shadow-lg: 0 10px 30px rgba(0,0,0,0.1);
--shadow-xl: 0 20px 50px rgba(0,0,0,0.12);
--ecg-color: rgba(37, 99, 235, 0.08);
--tooltip-bg: #1e293b;
--tooltip-text: #f8fafc;
--radius-sm: 8px;
--radius-md: 12px;
--radius-lg: 16px;
--radius-xl: 20px;
--transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
--bg-primary: #0f172a;
--bg-secondary: #1e293b;
--bg-tertiary: #1a2332;
--bg-card: #1e293b;
--text-primary: #f1f5f9;
--text-secondary: #94a3b8;
--text-muted: #64748b;
--accent-primary: #3b82f6;
--accent-secondary: #60a5fa;
--accent-glow: rgba(59, 130, 246, 0.2);
--border-color: #334155;
--border-light: #2a3a50;
--shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
--shadow-md: 0 4px 12px rgba(0,0,0,0.4);
--shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
--shadow-xl: 0 20px 50px rgba(0,0,0,0.6);
--ecg-color: rgba(59, 130, 246, 0.06);
--tooltip-bg: #f1f5f9;
--tooltip-text: #1e293b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'Inter', sans-serif;
background: var(--bg-primary);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
transition: var(--transition);
}

/* ECG Background */
.ecg-bg {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 0;
opacity: 0.4;
}

.ecg-line {
position: absolute;
width: 200%;
height: 2px;
background: repeating-linear-gradient(90deg, transparent 0px, transparent 30px, var(--ecg-color) 30px, var(--ecg-color) 32px, transparent 32px, transparent 40px, var(--ecg-color) 40px, transparent 42px, transparent 44px, var(--ecg-color) 44px, var(--ecg-color) 46px, transparent 46px, transparent 50px, var(--ecg-color) 50px, transparent 54px, transparent 56px, var(--ecg-color) 56px, transparent 58px, transparent 100px);
animation: ecgScroll 8s linear infinite;
}

.ecg-line:nth-child(1) { top: 15%; animation-delay: 0s; }
.ecg-line:nth-child(2) { top: 45%; animation-delay: -3s; opacity: 0.6; }
.ecg-line:nth-child(3) { top: 75%; animation-delay: -5s; opacity: 0.4; }
.ecg-line:nth-child(4) { top: 90%; animation-delay: -7s; opacity: 0.3; }

@keyframes ecgScroll {
0% { transform: translateX(0); }
100% { transform: translateX(-50%); }
}

/* Header */
.header {
position: sticky;
top: 0;
z-index: 100;
background: var(--bg-secondary);
border-bottom: 1px solid var(--border-color);
backdrop-filter: blur(20px);
box-shadow: var(--shadow-sm);
}

.header-inner {
max-width: 1400px;
margin: 0 auto;
padding: 12px 24px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 16px;
}

.logo {
display: flex;
align-items: center;
gap: 12px;
}

.logo-icon {
width: 42px;
height: 42px;
background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
border-radius: var(--radius-md);
display: flex;
align-items: center;
justify-content: center;
color: white;
font-size: 22px;
box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

.logo-text h1 {
font-size: 18px;
font-weight: 700;
background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
line-height: 1.2;
}

.logo-text span {
font-size: 11px;
color: var(--text-muted);
font-weight: 500;
letter-spacing: 0.5px;
text-transform: uppercase;
}

.header-controls {
display: flex;
align-items: center;
gap: 12px;
}

.case-selector {
display: flex;
background: var(--bg-tertiary);
border-radius: var(--radius-md);
padding: 3px;
gap: 2px;
}

.case-btn {
padding: 8px 16px;
border: none;
background: transparent;
color: var(--text-secondary);
font-size: 12px;
font-weight: 600;
border-radius: var(--radius-sm);
cursor: pointer;
transition: var(--transition);
white-space: nowrap;
}

.case-btn.active {
background: var(--accent-primary);
color: white;
box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
}

.case-btn:hover:not(.active) {
background: var(--border-color);
color: var(--text-primary);
}

.dark-toggle {
width: 42px;
height: 42px;
border: 1px solid var(--border-color);
border-radius: var(--radius-md);
background: var(--bg-tertiary);
color: var(--text-secondary);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--transition);
font-size: 20px;
}

.dark-toggle:hover {
background: var(--accent-primary);
color: white;
border-color: var(--accent-primary);
transform: scale(1.05);
}

/* Tab Navigation */
.tab-nav {
background: var(--bg-secondary);
border-bottom: 1px solid var(--border-color);
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}

.tab-nav::-webkit-scrollbar { display: none; }

.tab-nav-inner {
max-width: 1400px;
margin: 0 auto;
display: flex;
padding: 0 24px;
gap: 4px;
}

.tab-btn {
padding: 14px 20px;
border: none;
background: transparent;
color: var(--text-muted);
font-size: 13px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
position: relative;
transition: var(--transition);
display: flex;
align-items: center;
gap: 8px;
border-bottom: 3px solid transparent;
}

.tab-btn .tab-icon {
font-size: 18px;
}

.tab-btn:hover {
color: var(--text-primary);
background: var(--bg-tertiary);
}

.tab-btn.active {
color: var(--accent-primary);
border-bottom-color: var(--accent-primary);
}

/* Main Content */
.main-content {
max-width: 1400px;
margin: 0 auto;
padding: 24px;
position: relative;
z-index: 1;
}

.tab-panel {
display: none;
animation: fadeSlideIn 0.4s ease;
}

.tab-panel.active { display: block; }

@keyframes fadeSlideIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

/* Card Styles */
.card {
background: var(--bg-card);
border: 1px solid var(--border-color);
border-radius: var(--radius-lg);
padding: 24px;
margin-bottom: 20px;
box-shadow: var(--shadow-sm);
transition: var(--transition);
}

.card:hover {
box-shadow: var(--shadow-md);
}

.card-header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 20px;
padding-bottom: 16px;
border-bottom: 1px solid var(--border-light);
}

.card-header-icon {
width: 40px;
height: 40px;
border-radius: var(--radius-md);
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
color: white;
flex-shrink: 0;
}

.card-header h3 {
font-size: 16px;
font-weight: 700;
}

.card-header p {
font-size: 12px;
color: var(--text-muted);
margin-top: 2px;
}

/* Patient ID Card */
.patient-id {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 16px;
}

.id-field {
background: var(--bg-tertiary);
border-radius: var(--radius-md);
padding: 16px;
border-left: 4px solid var(--accent-primary);
}

.id-field .label {
font-size: 10px;
text-transform: uppercase;
letter-spacing: 1px;
color: var(--text-muted);
font-weight: 600;
margin-bottom: 6px;
}

.id-field .value {
font-size: 15px;
font-weight: 700;
color: var(--text-primary);
}

.id-field.diagnosis {
border-left-color: var(--accent-purple);
background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(59, 130, 246, 0.05));
}

/* Findings */
.findings-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 12px;
}

.finding-item {
display: flex;
align-items: flex-start;
gap: 12px;
padding: 14px;
border-radius: var(--radius-md);
background: var(--bg-tertiary);
transition: var(--transition);
cursor: default;
position: relative;
}

.finding-item:hover {
transform: translateY(-2px);
box-shadow: var(--shadow-md);
}

.finding-item.abnormal {
background: linear-gradient(135deg, rgba(239, 68, 68, 0.06), rgba(239, 68, 68, 0.02));
border: 1px solid rgba(239, 68, 68, 0.15);
}

.finding-item.normal {
background: linear-gradient(135deg, rgba(16, 185, 129, 0.06), rgba(16, 185, 129, 0.02));
border: 1px solid rgba(16, 185, 129, 0.15);
}

.finding-dot {
width: 10px;
height: 10px;
border-radius: 50%;
margin-top: 4px;
flex-shrink: 0;
}

.finding-item.abnormal .finding-dot { background: var(--accent-red); }
.finding-item.normal .finding-dot { background: var(--accent-green); }

.finding-text {
font-size: 13px;
font-weight: 500;
line-height: 1.5;
}

.finding-text .significance {
font-size: 11px;
color: var(--text-muted);
display: block;
margin-top: 4px;
font-weight: 400;
font-style: italic;
}

/* Tooltip */
.tooltip-trigger {
position: relative;
cursor: help;
border-bottom: 1px dotted var(--accent-primary);
}

.tooltip-content {
position: absolute;
bottom: calc(100% + 8px);
left: 50%;
transform: translateX(-50%) scale(0.95);
background: var(--tooltip-bg);
color: var(--tooltip-text);
padding: 10px 14px;
border-radius: var(--radius-sm);
font-size: 12px;
line-height: 1.5;
white-space: normal;
width: 240px;
opacity: 0;
visibility: hidden;
transition: var(--transition);
z-index: 999;
box-shadow: var(--shadow-lg);
pointer-events: none;
}

.tooltip-content::after {
content: '';
position: absolute;
top: 100%;
left: 50%;
transform: translateX(-50%);
border: 6px solid transparent;
border-top-color: var(--tooltip-bg);
}

.tooltip-trigger:hover .tooltip-content {
opacity: 1;
visibility: visible;
transform: translateX(-50%) scale(1);
}

/* Lab Grid */
.lab-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 12px;
}

.lab-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 16px;
background: var(--bg-tertiary);
border-radius: var(--radius-md);
border: 1px solid var(--border-light);
}

.lab-item .lab-name {
font-size: 13px;
font-weight: 500;
color: var(--text-secondary);
}

.lab-item .lab-value {
font-family: 'JetBrains Mono', monospace;
font-size: 14px;
font-weight: 600;
}

.lab-item .lab-value.abnormal {
color: var(--accent-red);
font-weight: 700;
}

.lab-item .lab-value.normal {
color: var(--accent-green);
}

/* Pearls */
.pearl-card {
background: linear-gradient(135deg, rgba(245, 158, 11, 0.06), rgba(245, 158, 11, 0.02));
border: 1px solid rgba(245, 158, 11, 0.2);
border-radius: var(--radius-lg);
padding: 20px;
margin-bottom: 16px;
position: relative;
overflow: hidden;
}

.pearl-card::before {
content: '⭐';
position: absolute;
top: 16px;
right: 16px;
font-size: 24px;
opacity: 0.3;
}

.pearl-card h4 {
font-size: 14px;
font-weight: 700;
color: var(--accent-orange);
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 8px;
}

.pearl-card p, .pearl-card li {
font-size: 13px;
line-height: 1.7;
color: var(--text-secondary);
}

.pearl-card ul {
padding-left: 20px;
margin-top: 8px;
}

.pearl-card li {
margin-bottom: 6px;
}

.red-flag {
background: linear-gradient(135deg, rgba(239, 68, 68, 0.06), rgba(239, 68, 68, 0.02));
border: 1px solid rgba(239, 68, 68, 0.2);
}

.red-flag::before { content: '🚨'; }

.red-flag h4 { color: var(--accent-red); }

.rule-out-card {
background: linear-gradient(135deg, rgba(37, 99, 235, 0.06), rgba(37, 99, 235, 0.02));
border: 1px solid rgba(37, 99, 235, 0.2);
}

.rule-out-card::before { content: '🔎'; }
.rule-out-card h4 { color: var(--accent-primary); }

/* Reveal Cards */
.reveal-card {
background: var(--bg-card);
border: 1px solid var(--border-color);
border-radius: var(--radius-lg);
margin-bottom: 16px;
overflow: hidden;
transition: var(--transition);
}

.reveal-header {
padding: 20px 24px;
display: flex;
align-items: center;
justify-content: space-between;
cursor: pointer;
transition: var(--transition);
}

.reveal-header:hover {
background: var(--bg-tertiary);
}

.reveal-header-left {
display: flex;
align-items: center;
gap: 14px;
}

.reveal-step {
width: 36px;
height: 36px;
border-radius: 50%;
background: var(--accent-primary);
color: white;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
font-weight: 700;
flex-shrink: 0;
}

.reveal-header h4 {
font-size: 15px;
font-weight: 700;
}

.reveal-arrow {
font-size: 24px;
color: var(--text-muted);
transition: var(--transition);
}

.reveal-card.open .reveal-arrow {
transform: rotate(180deg);
color: var(--accent-primary);
}

.reveal-body {
max-height: 0;
overflow: hidden;
transition: max-height 0.4s ease;
}

.reveal-card.open .reveal-body {
max-height: 600px;
}

.reveal-content {
padding: 0 24px 24px 74px;
font-size: 13px;
line-height: 1.8;
color: var(--text-secondary);
}

.reveal-content strong {
color: var(--text-primary);
}

.reveal-content ul {
padding-left: 18px;
margin-top: 8px;
}

.reveal-content li {
margin-bottom: 6px;
}

/* MCQ Section */
.mcq-stats {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
gap: 12px;
margin-bottom: 24px;
}

.stat-card {
background: var(--bg-card);
border: 1px solid var(--border-color);
border-radius: var(--radius-md);
padding: 16px;
text-align: center;
}

.stat-card .stat-value {
font-size: 28px;
font-weight: 800;
color: var(--accent-primary);
font-family: 'JetBrains Mono', monospace;
}

.stat-card .stat-label {
font-size: 11px;
color: var(--text-muted);
text-transform: uppercase;
letter-spacing: 0.5px;
margin-top: 4px;
font-weight: 600;
}

.stat-card.streak .stat-value { color: var(--accent-orange); }
.stat-card.correct .stat-value { color: var(--accent-green); }
.stat-card.wrong .stat-value { color: var(--accent-red); }

.mcq-container {
background: var(--bg-card);
border: 1px solid var(--border-color);
border-radius: var(--radius-lg);
padding: 28px;
margin-bottom: 20px;
}

.mcq-progress {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 20px;
}

.mcq-progress-bar {
flex: 1;
height: 6px;
background: var(--bg-tertiary);
border-radius: 3px;
overflow: hidden;
}

.mcq-progress-fill {
height: 100%;
background: linear-gradient(90deg, var(--accent-primary), var(--accent-purple));
border-radius: 3px;
transition: width 0.4s ease;
}

.mcq-progress-text {
font-size: 12px;
font-weight: 600;
color: var(--text-muted);
white-space: nowrap;
}

.mcq-question {
font-size: 15px;
font-weight: 600;
line-height: 1.7;
margin-bottom: 20px;
color: var(--text-primary);
}

.mcq-options {
display: flex;
flex-direction: column;
gap: 10px;
}

.mcq-option {
padding: 14px 18px;
border: 2px solid var(--border-color);
border-radius: var(--radius-md);
cursor: pointer;
transition: var(--transition);
font-size: 14px;
line-height: 1.5;
display: flex;
align-items: flex-start;
gap: 12px;
}

.mcq-option:hover:not(.disabled) {
border-color: var(--accent-primary);
background: var(--accent-glow);
transform: translateX(4px);
}

.mcq-option .option-letter {
width: 28px;
height: 28px;
border-radius: 50%;
background: var(--bg-tertiary);
display: flex;
align-items: center;
justify-content: center;
font-size: 13px;
font-weight: 700;
color: var(--text-secondary);
flex-shrink: 0;
}

.mcq-option.correct {
border-color: var(--accent-green);
background: rgba(16, 185, 129, 0.08);
}

.mcq-option.correct .option-letter {
background: var(--accent-green);
color: white;
}

.mcq-option.incorrect {
border-color: var(--accent-red);
background: rgba(239, 68, 68, 0.08);
}

.mcq-option.incorrect .option-letter {
background: var(--accent-red);
color: white;
}

.mcq-option.disabled {
pointer-events: none;
opacity: 0.7;
}

.mcq-option.disabled.correct {
opacity: 1;
}

.mcq-explanation {
margin-top: 16px;
padding: 16px;
border-radius: var(--radius-md);
font-size: 13px;
line-height: 1.7;
display: none;
}

.mcq-explanation.show { display: block; }

.mcq-explanation.correct-exp {
background: rgba(16, 185, 129, 0.08);
border: 1px solid rgba(16, 185, 129, 0.2);
color: var(--text-secondary);
}

.mcq-explanation.incorrect-exp {
background: rgba(239, 68, 68, 0.08);
border: 1px solid rgba(239, 68, 68, 0.2);
color: var(--text-secondary);
}

.mcq-nav {
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 20px;
gap: 12px;
}

.mcq-nav-btn {
padding: 12px 24px;
border: none;
border-radius: var(--radius-md);
font-size: 13px;
font-weight: 600;
cursor: pointer;
transition: var(--transition);
display: flex;
align-items: center;
gap: 8px;
}

.mcq-nav-btn.primary {
background: var(--accent-primary);
color: white;
}

.mcq-nav-btn.primary:hover {
background: var(--accent-secondary);
transform: translateY(-2px);
box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

.mcq-nav-btn.secondary {
background: var(--bg-tertiary);
color: var(--text-secondary);
border: 1px solid var(--border-color);
}

.mcq-nav-btn.secondary:hover {
background: var(--border-color);
}

.mcq-nav-btn:disabled {
opacity: 0.4;
cursor: not-allowed;
transform: none !important;
}

/* Mistakes Review */
.mistakes-section {
margin-top: 24px;
}

.mistake-item {
background: var(--bg-card);
border: 1px solid rgba(239, 68, 68, 0.15);
border-radius: var(--radius-md);
padding: 16px;
margin-bottom: 12px;
border-left: 4px solid var(--accent-red);
}

.mistake-item .mq {
font-size: 13px;
font-weight: 600;
margin-bottom: 8px;
}

.mistake-item .ma {
font-size: 12px;
color: var(--accent-green);
font-weight: 600;
}

.mistake-item .mexp {
font-size: 12px;
color: var(--text-muted);
margin-top: 4px;
}

/* Algorithm / Flowchart */
.flowchart {
display: flex;
flex-direction: column;
align-items: center;
gap: 0;
padding: 20px 0;
}

.flow-node {
background: var(--bg-card);
border: 2px solid var(--border-color);
border-radius: var(--radius-lg);
padding: 18px 24px;
max-width: 500px;
width: 100%;
text-align: center;
cursor: pointer;
transition: var(--transition);
position: relative;
}

.flow-node:hover {
border-color: var(--accent-primary);
box-shadow: var(--shadow-md);
transform: scale(1.02);
}

.flow-node.active {
border-color: var(--accent-primary);
background: var(--accent-glow);
}

.flow-node h5 {
font-size: 14px;
font-weight: 700;
margin-bottom: 4px;
}

.flow-node p {
font-size: 12px;
color: var(--text-muted);
display: none;
margin-top: 8px;
line-height: 1.6;
}

.flow-node.active p {
display: block;
color: var(--text-secondary);
}

.flow-node.start { border-color: var(--accent-green); }
.flow-node.decision { border-color: var(--accent-orange); border-radius: 8px; transform: none; }

.takeaway-card.green { border-top-color: var(--accent-green); }

// ======================== STATE ========================
let currentCase = parseInt(localStorage.getItem('currentCase') || '0');
let currentTab = localStorage.getItem('currentTab') || 'case-file';
let mcqState = {};

function getMcqKey() { return 'mcq_' + cases[currentCase].id; }

function loadMcqState() {
const saved = localStorage.getItem(getMcqKey());
if (saved) {
mcqState = JSON.parse(saved);
} else {
mcqState = {
currentQ: 0,
score: 0,
streak: 0,
maxStreak: 0,
answered: [],
mistakes: [],
completed: false
};
}
}

function saveMcqState() {
localStorage.setItem(getMcqKey(), JSON.stringify(mcqState));
}

// ======================== DARK MODE ========================
function initTheme() {
const saved = localStorage.getItem('darkMode');
if (saved === 'true') {
document.documentElement.setAttribute('data-theme', 'dark');
document.getElementById('themeIcon').textContent = 'light_mode';
}
}

function toggleDarkMode() {
const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
if (isDark) {
document.documentElement.removeAttribute('data-theme');
document.getElementById('themeIcon').textContent = 'dark_mode';
localStorage.setItem('darkMode', 'false');
} else {
document.documentElement.setAttribute('data-theme', 'dark');
document.getElementById('themeIcon').textContent = 'light_mode';
localStorage.setItem('darkMode', 'true');
}
}

// ======================== CASE SWITCHING ========================
function switchCase(idx) {
currentCase = idx;
localStorage.setItem('currentCase', idx);
loadMcqState();
document.querySelectorAll('.case-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
renderCurrentTab();
}

// ======================== TAB SWITCHING ========================
function switchTab(tabId) {
currentTab = tabId;
localStorage.setItem('currentTab', tabId);
document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === tabId));
renderCurrentTab();
}

function renderCurrentTab() {
const c = cases[currentCase];
const main = document.getElementById('mainContent');

switch(currentTab) {
case 'case-file': main.innerHTML = renderCaseFile(c); break;
case 'pearls': main.innerHTML = renderPearls(c); break;
case 'reasoning': main.innerHTML = renderReasoning(c); break;
case 'mcq': main.innerHTML = renderMCQ(c); break;
case 'algorithm': main.innerHTML = renderAlgorithm(c); break;
case 'takeaways': main.innerHTML = renderTakeaways(c); break;
}
}

// ======================== RENDER: MCQ ========================
function renderMCQ(c) {
loadMcqState();
const total = c.mcqs.length;
const wrongCount = mcqState.mistakes.length;

if (mcqState.completed) {
const pct = Math.round((mcqState.score / total) * 100);
let mistakesHtml = '';
if (mcqState.mistakes.length > 0) {
mistakesHtml = `
<div class="mistakes-section">
<h3 style="margin-bottom:16px; font-size:16px;">❌ Mistakes Review</h3>
${mcqState.mistakes.map(m => `
<div class="mistake-item">
<div class="mq">Q: ${c.mcqs[m.qIdx].q}</div>
<div class="ma">✅ Correct: ${c.mcqs[m.qIdx].options[c.mcqs[m.qIdx].correct]}</div>
<div class="mexp">${c.mcqs[m.qIdx].explanation}</div>
</div>
`).join('')}
</div>
`;
} else {
mistakesHtml = `<div class="no-mistakes"><span class="material-icons-outlined">check_circle</span>Perfect score! No mistakes to review.</div>`;
}

return `
<div class="tab-panel active">
<div class="score-summary">
<div class="score-circle"><span>${pct}%</span></div>
<h3>${pct >= 80 ? '🎉 Excellent!' : pct >= 60 ? '👍 Good effort!' : '📚 Keep reviewing!'}</h3>
<p>${mcqState.score} / ${total} correct &nbsp;|&nbsp; Max Streak: ${mcqState.maxStreak} 🔥</p>
</div>
${mistakesHtml}
<div style="text-align:center; margin-top:24px;">
<button class="mcq-nav-btn primary" onclick="resetMCQ()">
<span class="material-icons-outlined">replay</span> Retry All Questions
</button>
</div>
</div>
`;
}

const qi = mcqState.currentQ;
const question = c.mcqs[qi];
const answered = mcqState.answered.includes(qi);
const progress = ((qi + 1) / total) * 100;
const letters = ['A', 'B', 'C', 'D'];

let optionsHtml = question.options.map((opt, oi) => {
let cls = 'mcq-option';
if (answered) {
cls += ' disabled';
if (oi === question.correct) cls += ' correct';
else if (mcqState.lastSelected === oi) cls += ' incorrect';
}
return `
<div class="${cls}" onclick="selectAnswer(${qi}, ${oi})">
<span class="option-letter">${letters[oi]}</span>
<span>${opt}</span>
</div>
`;
}).join('');

let expClass = '', expContent = '';
if (answered) {
const wasCorrect = mcqState.lastSelected === question.correct;
expClass = wasCorrect ? 'correct-exp show' : 'incorrect-exp show';
expContent = `<strong>${wasCorrect ? '✅ Correct!' : '❌ Incorrect.'}</strong> ${question.explanation}`;
}

return `
<div class="tab-panel active">
<div class="section-header">
<h2>📝 Exam MCQs</h2>
<p>${c.title}</p>
</div>
<div class="mcq-stats">
<div class="stat-card">
<div class="stat-value">${qi + 1}/${total}</div>
<div class="stat-label">Question</div>
</div>
<div class="stat-card correct">
<div class="stat-value">${mcqState.score}</div>
<div class="stat-label">Correct</div>
</div>
<div class="stat-card streak">
<div class="stat-value">${mcqState.streak} 🔥</div>
<div class="stat-label">Streak</div>
</div>
<div class="stat-card wrong">
<div class="stat-value">${wrongCount}</div>
<div class="stat-label">Mistakes</div>
</div>
</div>

<div class="mcq-container">
<div class="mcq-progress">
<div class="mcq-progress-bar">
<div class="mcq-progress-fill" style="width:${progress}%"></div>
</div>
<span class="mcq-progress-text">${Math.round(progress)}%</span>
</div>
<div class="mcq-question">${question.q}</div>
<div class="mcq-options">
${optionsHtml}
</div>
<div class="mcq-explanation ${expClass}">${expContent}</div>
<div class="mcq-nav">
<button class="mcq-nav-btn secondary" onclick="prevQuestion()" ${qi === 0 ? 'disabled' : ''}>
<span class="material-icons-outlined">arrow_back</span> Previous
</button>
<button class="mcq-nav-btn primary" onclick="nextQuestion()" ${!answered ? 'disabled' : ''}>
${qi === total - 1 && answered ? 'View Results' : 'Next'} <span class="material-icons-outlined">arrow_forward</span>
</button>
</div>
</div>
<div style="text-align:right; margin-top:8px;">
<button class="reset-btn" onclick="resetMCQ()">
<span class="material-icons-outlined" style="font-size:14px;vertical-align:middle;">replay</span> Reset Progress
</button>
</div>
</div>
`;
}

function selectAnswer(qi, oi) {
if (mcqState.answered.includes(qi)) return;
const c = cases[currentCase];
const question = c.mcqs[qi];
mcqState.answered.push(qi);
mcqState.lastSelected = oi;

if (oi === question.correct) {
mcqState.score++;
mcqState.streak++;
if (mcqState.streak > mcqState.maxStreak) mcqState.maxStreak = mcqState.streak;
} else {
mcqState.streak = 0;
mcqState.mistakes.push({ qIdx: qi, selected: oi });
}
saveMcqState();
renderCurrentTab();
}

function nextQuestion() {
const c = cases[currentCase];
if (mcqState.currentQ >= c.mcqs.length - 1) {
mcqState.completed = true;
saveMcqState();
} else {
mcqState.currentQ++;
saveMcqState();
}
renderCurrentTab();
}

function prevQuestion() {
if (mcqState.currentQ > 0) {
mcqState.currentQ--;
saveMcqState();
renderCurrentTab();
}
}

function resetMCQ() {
mcqState = {
currentQ: 0,
score: 0,
streak: 0,
maxStreak: 0,
answered: [],
mistakes: [],
completed: false
};
saveMcqState();
renderCurrentTab();
}

// ======================== RENDER: ALGORITHM ========================
function renderAlgorithm(c) {
const nodes = c.algorithm.nodes;
// Determine layout based on case
let flowHtml = '';

if (c.id === 'wallenberg') {
// Wallenberg algorithm: linear with one branch
flowHtml = `
<div class="flowchart">
${renderFlowNode(nodes[0])}
${renderFlowArrow()}
${renderFlowNode(nodes[1])}
${renderFlowArrow()}
<div class="flow-branch-labels">
<div class="flow-branch-label">YES ✓</div>
<div class="flow-branch-label">NO ✗</div>
</div>
<div class="flow-branch">
${renderFlowNode(nodes[2])}
${renderFlowNode(nodes[3])}
</div>
${renderFlowArrow()}
${renderFlowNode(nodes[4])}
${renderFlowArrow()}
<div class="flow-branch-labels">
<div class="flow-branch-label">YES — Spared ✓</div>
<div class="flow-branch-label">NO — Damaged ✗</div>
</div>
<div class="flow-branch">
${renderFlowNode(nodes[5])}
${renderFlowNode(nodes[6])}
</div>
${renderFlowArrow()}
${renderFlowNode(nodes[7])}
${renderFlowArrow()}
${renderFlowNode(nodes[8])}
</div>
`;
} else {
// Hydrocephalus algorithm
flowHtml = `
<div class="flowchart">
${renderFlowNode(nodes[0])}
${renderFlowArrow()}
${renderFlowNode(nodes[1])}
${renderFlowArrow()}
${renderFlowNode(nodes[2])}
${renderFlowArrow()}
${renderFlowNode(nodes[3])}
${renderFlowArrow()}
<div class="flow-branch-labels">
<div class="flow-branch-label" style="max-width:220px">Lat+3rd ↑, 4th Normal</div>
<div class="flow-branch-label" style="max-width:220px">All Dilated</div>
<div class="flow-branch-label" style="max-width:220px">One Lat ↑</div>
</div>
<div class="flow-branch">
${renderFlowNode(nodes[4])}
${renderFlowNode(nodes[5])}
${renderFlowNode(nodes[6])}
</div>
${renderFlowArrow()}
${renderFlowNode(nodes[7])}
${renderFlowArrow()}
${renderFlowNode(nodes[8])}
</div>
`;
}

return `
<div class="tab-panel active">
<div class="section-header">
<h2>🛤️ Diagnostic Algorithm</h2>
<p>Click each node to reveal clinical reasoning</p>
</div>
${flowHtml}
</div>
`;
}

function renderFlowNode(node) {
return `
<div class="flow-node ${node.type}" onclick="this.classList.toggle('active')">
<h5>${node.title}</h5>
<p>${node.detail}</p>
</div>
`;
}

function renderFlowArrow() {
return `<div class="flow-arrow"></div>`;
}

// ======================== RENDER: TAKEAWAYS ========================
function renderTakeaways(c) {
let cardsHtml = c.takeaways.map(t => {
let keywordsHtml = t.keywords.map((k, i) => `<span class="keyword ${i < 2 ? 'highlight' : ''}">${k}</span>`).join('');
let listHtml = '';
if (t.items) {
listHtml = `<ul>${t.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
}
return `
<div class="takeaway-card ${t.color}">
<h4>${t.title}</h4>
<div>${keywordsHtml}</div>
<p>${t.text}</p>
${listHtml}
</div>
`;
}).join('');

return `
<div class="tab-panel active">
<div class="section-header">
<h2>⚡ Rapid Takeaways</h2>
<p>Ultra-condensed, exam-ready revision</p>
</div>
<div class="takeaway-grid">
${cardsHtml}
</div>
</div>
`;
}

// ======================== INIT ========================
function init() {
initTheme();
loadMcqState();
// Restore last tab
const savedTab = localStorage.getItem('currentTab');
if (savedTab) currentTab = savedTab;
document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === currentTab));
document.querySelectorAll('.case-btn').forEach((b, i) => b.classList.toggle('active', i === currentCase));
renderCurrentTab();
}

init();
</script>
</body>
</html>
