<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e17;--surface:#111827;--surface2:#1a2332;--surface3:#243044;
--primary:#00d4aa;--primary-dim:#00a885;--secondary:#6366f1;--accent:#f59e0b;
--danger:#ef4444;--success:#10b981;--text:#e2e8f0;--text-dim:#94a3b8;
--text-muted:#64748b;--border:#1e293b;--glow:0 0 20px rgba(0,212,170,0.15);
--card-radius:12px;--transition:all 0.3s ease;
}
.light-mode{
--bg:#f0f4f8;--surface:#ffffff;--surface2:#f8fafc;--surface3:#e2e8f0;
--text:#1e293b;--text-dim:#475569;--text-muted:#64748b;--border:#cbd5e1;
--glow:0 0 20px rgba(0,212,170,0.1);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;transition:var(--transition)}
/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--primary-dim);border-radius:3px}

/* Sidebar */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:var(--transition)}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-header h1{font-size:1.1rem;color:var(--primary);letter-spacing:1px;margin-bottom:4px}
.sidebar-header .subtitle{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px}
.ecg-line{height:40px;margin:10px 0;position:relative;overflow:hidden}
.ecg-line svg{width:100%;height:100%}
.ecg-path{stroke:var(--primary);stroke-width:2;fill:none;stroke-dasharray:300;stroke-dashoffset:300;animation:ecgDraw 3s linear infinite}
@keyframes ecgDraw{0%{stroke-dashoffset:300}100%{stroke-dashoffset:0}}
.case-list{flex:1;overflow-y:auto;padding:10px}
.case-item{padding:12px 16px;margin:4px 8px;border-radius:8px;cursor:pointer;transition:var(--transition);border:1px solid transparent;font-size:.85rem;display:flex;align-items:center;gap:10px}
.case-item:hover{background:var(--surface2);border-color:var(--border)}
.case-item.active{background:linear-gradient(135deg,rgba(0,212,170,0.1),rgba(99,102,241,0.1));border-color:var(--primary);color:var(--primary)}
.case-item .case-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:var(--surface3);flex-shrink:0}
.case-item.active .case-icon{background:var(--primary);color:var(--bg)}
.case-item .case-info{flex:1;min-width:0}
.case-item .case-title{font-weight:600;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.case-item .case-sub{font-size:.65rem;color:var(--text-muted);margin-top:2px}

/* Stats bar */
.stats-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-around}
.stat{text-align:center}
.stat-val{font-size:1.1rem;font-weight:700;color:var(--primary)}
.stat-label{font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Dark mode toggle */
.dm-toggle{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.dm-toggle span{font-size:.8rem;color:var(--text-dim)}
.toggle-switch{width:44px;height:24px;border-radius:12px;background:var(--surface3);position:relative;transition:var(--transition)}
.toggle-switch::after{content:'';width:18px;height:18px;border-radius:50%;background:var(--text-dim);position:absolute;top:3px;left:3px;transition:var(--transition)}
.toggle-switch.on{background:var(--primary)}
.toggle-switch.on::after{left:23px;background:#fff}

/* Main */
.main{flex:1;margin-left:280px;display:flex;flex-direction:column;min-height:100vh;transition:var(--transition)}
.top-bar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:50}
.case-title-display{font-size:1rem;font-weight:700}
.case-badge{font-size:.65rem;padding:4px 10px;border-radius:20px;background:rgba(0,212,170,0.15);color:var(--primary);font-weight:600}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}

/* Mobile dropdown */
.mobile-case-select{display:none;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.mobile-case-select select{width:100%;padding:10px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);font-size:.85rem}

/* Tabs */
.tabs{display:flex;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;gap:0}
.tab{padding:12px 18px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;transition:var(--transition);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Content */
.content{flex:1;padding:24px;overflow-y:auto}
.tab-content{display:none;animation:fadeIn .4s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px;margin-bottom:16px;transition:var(--transition)}
.card:hover{box-shadow:var(--glow)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-header .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.card-header h3{font-size:.9rem;font-weight:700}
.card-header .tag{font-size:.6rem;padding:3px 8px;border-radius:12px;font-weight:600;margin-left:auto}

/* Patient Profile */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.profile-item{background:var(--surface2);padding:12px;border-radius:8px;border-left:3px solid var(--primary)}
.profile-item .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.profile-item .value{font-size:.9rem;font-weight:600}

/* HPI highlights */
.hpi-text{line-height:1.8;font-size:.88rem;color:var(--text-dim)}
.hpi-text .hl{color:var(--accent);font-weight:600;cursor:pointer;position:relative;border-bottom:1px dashed var(--accent)}
.tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface3);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.75rem;width:250px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none;opacity:0;transition:opacity .2s;line-height:1.5}
.hl:hover .tooltip{opacity:1}

/* Labs grid */
.labs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.lab-item{background:var(--surface2);padding:12px;border-radius:8px;text-align:center}
.lab-item .lab-name{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.lab-item .lab-val{font-size:1.05rem;font-weight:700}
.lab-item .lab-ref{font-size:.6rem;color:var(--text-muted);margin-top:4px}
.lab-item.abnormal{border:1px solid var(--danger)}
.lab-item.abnormal .lab-val{color:var(--danger)}

/* Pearl bullets */
.pearl-list{list-style:none}
.pearl-list li{padding:10px 14px;margin:6px 0;background:var(--surface2);border-radius:8px;font-size:.85rem;line-height:1.6;border-left:3px solid var(--secondary);position:relative;padding-left:20px}
.pearl-list li::before{content:'💡';position:absolute;left:-8px;top:8px;font-size:.9rem}
.red-flag{border-left-color:var(--danger)!important}
.red-flag::before{content:'🚨'!important}
.misconception{border-left-color:var(--accent)!important}
.misconception::before{content:'⚠️'!important}

/* Reveal cards */
.reveal-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--card-radius);margin:10px 0;overflow:hidden}
.reveal-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:.85rem;transition:var(--transition)}
.reveal-header:hover{background:var(--surface3)}
.reveal-header .arrow{transition:transform .3s;font-size:.8rem}
.reveal-card.open .arrow{transform:rotate(180deg)}
.reveal-body{max-height:0;overflow:hidden;transition:max-height .4s ease;padding:0 18px}
.reveal-card.open .reveal-body{max-height:500px;padding:0 18px 16px}
.reveal-body p{font-size:.85rem;line-height:1.7;color:var(--text-dim);margin-top:8px}

/* MCQ */
.mcq-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.mcq-progress-bar{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.mcq-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:3px;transition:width .4s ease}
.mcq-counter{font-size:.75rem;color:var(--text-muted);font-weight:600}
.mcq-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:24px;margin-bottom:16px}
.mcq-stem{font-size:.9rem;line-height:1.7;margin-bottom:18px;font-weight:500}
.mcq-option{display:block;width:100%;padding:12px 16px;margin:6px 0;background:var(--surface2);border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:.85rem;text-align:left;color:var(--text);transition:var(--transition);position:relative}
.mcq-option:hover:not(.disabled){border-color:var(--primary);background:rgba(0,212,170,0.05)}
.mcq-option.correct{border-color:var(--success);background:rgba(16,185,129,0.1);color:var(--success)}
.mcq-option.wrong{border-color:var(--danger);background:rgba(239,68,68,0.1);color:var(--danger)}
.mcq-option.disabled{cursor:default;opacity:.7}
.mcq-option.show-correct{border-color:var(--success);background:rgba(16,185,129,0.08)}
.mcq-feedback{margin-top:12px;padding:12px 16px;border-radius:8px;font-size:.82rem;line-height:1.5;display:none;animation:fadeIn .3s}
.mcq-feedback.correct-fb{background:rgba(16,185,129,0.1);border:1px solid var(--success);color:var(--success);display:block}
.mcq-feedback.wrong-fb{background:rgba(239,68,68,0.1);border:1px solid var(--danger);color:var(--danger);display:block}
.mcq-nav{display:flex;justify-content:space-between;margin-top:16px}
.btn{padding:10px 20px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:var(--transition)}
.btn-primary{background:var(--primary);color:var(--bg)}
.btn-primary:hover{background:var(--primary-dim)}
.btn-secondary{background:var(--surface3);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.score-display{text-align:center;padding:20px;background:var(--surface2);border-radius:var(--card-radius);margin-top:20px}
.score-display .big-score{font-size:2.5rem;font-weight:800;color:var(--primary)}
.score-display .score-label{font-size:.8rem;color:var(--text-muted);margin-top:4px}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;background:rgba(245,158,11,0.15);color:var(--accent);font-size:.75rem;font-weight:700}

/* Rapid review */
.rapid-item{padding:8px 12px;margin:4px 0;background:var(--surface2);border-radius:6px;font-size:.82rem;line-height:1.5;border-left:3px solid var(--primary);color:var(--text-dim)}
.rapid-item strong{color:var(--text)}

/* Mistake review */
.mistake-card{background:var(--surface2);border:1px solid var(--danger);border-radius:8px;padding:14px;margin:8px 0}
.mistake-card .mq{font-size:.82rem;font-weight:600;margin-bottom:6px}
.mistake-card .ma{font-size:.78rem;color:var(--danger)}
.mistake-card .mc{font-size:.78rem;color:var(--success);margin-top:4px}
.mistake-card .me{font-size:.75rem;color:var(--text-muted);margin-top:6px;font-style:italic}

/* Neural animation */
.neural-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.04}

/* Responsive */
@media(max-width:768px){
.sidebar{transform:translateX(-100%);width:260px}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
.hamburger{display:block}
.mobile-case-select{display:block}
.content{padding:16px}
.profile-grid{grid-template-columns:1fr}
.labs-grid{grid-template-columns:repeat(2,1fr)}
.tabs{padding:0 12px}
.tab{padding:10px 12px;font-size:.7rem}
}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:99}
.overlay.show{display:block}

/* Pulse animation */
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse .6s ease}

/* Section headers */
.section-title{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
</style>

<button id="logout-btn"
  style="position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 10px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 30px; font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4); letter-spacing: 0.5px;">
  Log Out
</button>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Find the button
        const logoutBtn = document.getElementById("logout-btn");

        // 2. Attach the click event
        if (logoutBtn) {
          logoutBtn.addEventListener("click", () => {
            // Safety check: ensure Netlify Identity is loaded
            if (window.netlifyIdentity) {
              window.netlifyIdentity.logout();
            } else {
              console.error("Netlify Identity widget is not loaded.");
            }
          });
        }

        // 3. Optional but recommended: Redirect the user after they log out
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("logout", () => {
            // Redirects to the homepage. Change "/" to another URL if needed.
            window.location.href = "/";
          });
        }
      });
</script>

const tabNames = ["📂 Case File","💡 Physiology Pearls","🔍 Clinical Reasoning","📝 Exam MCQs","⚡ Rapid Review"];

// ===== LOCAL STORAGE =====
function saveState(){
try{localStorage.setItem('neuroPharmState',JSON.stringify(state))}catch(e){}
}
function loadState(){
try{
const s=localStorage.getItem('neuroPharmState');
if(s){
const parsed=JSON.parse(s);
Object.assign(state,parsed);
}
}catch(e){}
}

// ===== INIT =====
function init(){
loadState();
if(!state.darkMode) document.body.classList.add('light-mode');
updateDMSwitch();
renderSidebar();
renderMobileCaseSelect();
renderTabs();
selectCase(state.currentCase);
updateStats();
}

// ===== SIDEBAR =====
function renderSidebar(){
const list=document.getElementById('caseList');
list.innerHTML=cases.map((c,i)=>`
<div class="case-item ${i===state.currentCase?'active':''}" onclick="selectCase(${i})" id="caseItem${i}">
<div class="case-icon">${c.icon}</div>
<div class="case-info">
<div class="case-title">${c.shortTitle}</div>
<div class="case-sub">${c.badge}</div>
</div>
</div>
`).join('');
}

function renderMobileCaseSelect(){
const sel=document.getElementById('mobileCaseSelect');
sel.innerHTML=cases.map((c,i)=>`<option value="${i}" ${i===state.currentCase?'selected':''}>${c.badge}: ${c.shortTitle}</option>`).join('');
}

// ===== TABS =====
function renderTabs(){
const bar=document.getElementById('tabsBar');
bar.innerHTML=tabNames.map((t,i)=>`<div class="tab ${i===state.currentTab?'active':''}" onclick="switchTab(${i})">${t}</div>`).join('');
}

function switchTab(idx){
state.currentTab=idx;
saveState();
renderTabs();
renderContent();
}

// ===== SELECT CASE =====
function selectCase(idx){
idx=parseInt(idx);
state.currentCase=idx;
state.currentTab=0;
saveState();
document.getElementById('topTitle').textContent=cases[idx].title;
document.getElementById('topBadge').textContent=cases[idx].badge;
renderSidebar();
renderMobileCaseSelect();
renderTabs();
renderContent();
// close mobile sidebar
document.getElementById('sidebar').classList.remove('open');
document.getElementById('overlay').classList.remove('show');
}

// ===== RENDER CONTENT =====
function renderContent(){
const area=document.getElementById('contentArea');
const c=cases[state.currentCase];
const tab=state.currentTab;

if(tab===0) area.innerHTML=renderCaseFile(c);
else if(tab===1) area.innerHTML=renderPearls(c);
else if(tab===2) area.innerHTML=renderReasoning(c);
else if(tab===3) area.innerHTML=renderMCQ(c);
else if(tab===4) area.innerHTML=renderRapid(c);

// Attach reveal listeners
document.querySelectorAll('.reveal-header').forEach(h=>{
h.addEventListener('click',()=>{
h.parentElement.classList.toggle('open');
});
});
}

// ===== TAB RENDERERS =====
function renderCaseFile(c){
return `
<div class="card">
<div class="card-header">
<div class="icon" style="background:rgba(0,212,170,0.15);color:var(--primary)">👤</div>
<h3>Patient Profile</h3>
<div class="tag" style="background:rgba(99,102,241,0.15);color:var(--secondary)">${c.patient.dx}</div>
</div>
<div class="profile-grid">
${c.profile.map(p=>`<div class="profile-item"><div class="label">${p.label}</div><div class="value">${p.value}</div></div>`).join('')}
</div>
</div>
<div class="card">
<div class="card-header">
<div class="icon" style="background:rgba(245,158,11,0.15);color:var(--accent)">📋</div>
<h3>History of Present Illness</h3>
</div>
<div class="hpi-text">${c.hpiHTML}</div>
</div>
<div class="card">
<div class="card-header">
<div class="icon" style="background:rgba(239,68,68,0.15);color:var(--danger)">🔬</div>
<h3>Labs & Key Findings</h3>
</div>
<div class="labs-grid">
${c.labs.map(l=>`<div class="lab-item ${l.abnormal?'abnormal':''}"><div class="lab-name">${l.name}</div><div class="lab-val">${l.value}</div><div class="lab-ref">Ref: ${l.ref}</div></div>`).join('')}
</div>
</div>
`;
}

function renderPearls(c){
let pearlsHTML='',redFlags='',misconceptions='';
c.pearls.forEach(p=>{
if(p.type==='redflag') redFlags+=`<li class="red-flag">${p.text}</li>`;
else if(p.type==='misconception') misconceptions+=`<li class="misconception">${p.text}</li>`;
else pearlsHTML+=`<li>${p.text}</li>`;
});
return `
<div class="card">
<div class="card-header">
<div class="icon" style="background:rgba(0,212,170,0.15);color:var(--primary)">💡</div>
<h3>Physiology & Pharmacology Pearls</h3>
</div>
<ul class="pearl-list">${pearlsHTML}</ul>
</div>
${redFlags?`<div class="card"><div class="card-header"><div class="icon" style="background:rgba(239,68,68,0.15);color:var(--danger)">🚨</div><h3>Red Flags</h3></div><ul class="pearl-list">${redFlags}</ul></div>`:''}
${misconceptions?`<div class="card"><div class="card-header"><div class="icon" style="background:rgba(245,158,11,0.15);color:var(--accent)">⚠️</div><h3>Common Misconceptions</h3></div><ul class="pearl-list">${misconceptions}</ul></div>`:''}
`;
}

function renderReasoning(c){
return `
<div class="card">
<div class="card-header">
<div class="icon" style="background:rgba(99,102,241,0.15);color:var(--secondary)">🔍</div>
<h3>Clinical Reasoning — Interactive Reveal</h3>
</div>
${c.reasoning.map(r=>`
<div class="reveal-card">
<div class="reveal-header">${r.title}<span class="arrow">▼</span></div>
<div class="reveal-body"><p>${r.body}</p></div>
</div>
`).join('')}
</div>
`;
}

function renderMCQ(c){
const caseKey=`case${c.id}`;
if(!state.mcqIndex[caseKey]) state.mcqIndex[caseKey]=0;
if(!state.mcqAnswered[caseKey]) state.mcqAnswered[caseKey]={};
if(!state.mcqCorrect[caseKey]) state.mcqCorrect[caseKey]={};
if(!state.mistakes[caseKey]) state.mistakes[caseKey]=[];

const idx=state.mcqIndex[caseKey];
const total=c.mcqs.length;
const q=c.mcqs[idx];
const answered=state.mcqAnswered[caseKey][idx];
const wasCorrect=state.mcqCorrect[caseKey][idx];

// Count case score
let caseScore=0,caseAttempted=0;
for(let k in state.mcqCorrect[caseKey]){caseAttempted++;if(state.mcqCorrect[caseKey][k])caseScore++;}

const progress=((idx+1)/total)*100;

let optionsHTML=q.options.map((o,oi)=>{
let cls='mcq-option';
if(answered!==undefined){
cls+=' disabled';
if(oi===q.correct) cls+=' correct';
if(oi===answered && answered!==q.correct) cls+=' wrong';
if(oi!==answered && oi===q.correct) cls+=' show-correct';
}
return `<button class="${cls}" onclick="answerMCQ(${oi})" ${answered!==undefined?'disabled':''}>${o}</button>`;
}).join('');

let feedbackHTML='';
if(answered!==undefined){
if(wasCorrect){
feedbackHTML=`<div class="mcq-feedback correct-fb">✅ Correct! ${q.explanation}</div>`;
}else{
feedbackHTML=`<div class="mcq-feedback wrong-fb">❌ Incorrect. Correct: ${q.options[q.correct]}. ${q.explanation}</div>`;
}
}

// Mistake review
let mistakesHTML='';
if(state.mistakes[caseKey].length>0){
mistakesHTML=`<div class="section-title">❌ Mistake Review</div>`;
state.mistakes[caseKey].forEach(m=>{
mistakesHTML+=`<div class="mistake-card"><div class="mq">Q: ${m.stem}</div><div class="ma">Your Answer: ${m.yourAnswer}</div><div class="mc">Correct: ${m.correctAnswer}</div><div class="me">${m.explanation}</div></div>`;
});
}

return `
<div class="card">
<div class="card-header">
<div class="icon" style="background:rgba(99,102,241,0.15);color:var(--secondary)">📝</div>
<h3>Exam MCQs</h3>
<div class="tag" style="background:rgba(0,212,170,0.15);color:var(--primary)">${caseScore}/${caseAttempted} correct</div>
</div>
<div class="mcq-progress">
<div class="mcq-progress-bar"><div class="mcq-progress-fill" style="width:${progress}%"></div></div>
<div class="mcq-counter">Q${idx+1}/${total}</div>
<div class="streak-badge">🔥 ${state.streak}</div>
</div>
<div class="mcq-card">
<div class="mcq-stem">Q${idx+1}. ${q.stem}</div>
${optionsHTML}
${feedbackHTML}
</div>
<div class="mcq-nav">
<button class="btn btn-secondary" onclick="prevMCQ()" ${idx===0?'disabled':''}>← Previous</button>
<button class="btn btn-primary" onclick="nextMCQ()" ${idx>=total-1?'disabled':''}>Next →</button>
</div>
</div>
${mistakesHTML?`<div class="card">${mistakesHTML}</div>`:''}
`;
}

function answerMCQ(optIdx){
const c=cases[state.currentCase];
const caseKey=`case${c.id}`;
const idx=state.mcqIndex[caseKey];
const q=c.mcqs[idx];

if(state.mcqAnswered[caseKey][idx]!==undefined) return;

state.mcqAnswered[caseKey][idx]=optIdx;
const isCorrect=optIdx===q.correct;
state.mcqCorrect[caseKey][idx]=isCorrect;
state.totalAttempted++;

if(isCorrect){
state.totalScore++;
state.streak++;
}else{
state.streak=0;
if(!state.mistakes[caseKey]) state.mistakes[caseKey]=[];
state.mistakes[caseKey].push({
stem:q.stem,
yourAnswer:q.options[optIdx],
correctAnswer:q.options[q.correct],
explanation:q.explanation
});
}

saveState();
updateStats();
renderContent();
}

function nextMCQ(){
const c=cases[state.currentCase];
const caseKey=`case${c.id}`;
if(state.mcqIndex[caseKey]<c.mcqs.length-1){
state.mcqIndex[caseKey]++;
saveState();
renderContent();
}
}

function prevMCQ(){
const c=cases[state.currentCase];
const caseKey=`case${c.id}`;
if(state.mcqIndex[caseKey]>0){
state.mcqIndex[caseKey]--;
saveState();
renderContent();
}
}

function renderRapid(c){
return `
<div class="card">
<div class="card-header">
<div class="icon" style="background:rgba(245,158,11,0.15);color:var(--accent)">⚡</div>
<h3>Rapid Review — High Yield Only</h3>
</div>
${c.rapid.map(r=>{
let formatted=r.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
return `<div class="rapid-item">${formatted}</div>`;
}).join('')}
</div>
`;
}

// ===== STATS =====
function updateStats(){
document.getElementById('totalScore').textContent=state.totalScore;
document.getElementById('streakDisplay').textContent='🔥 '+state.streak;
document.getElementById('totalAttempted').textContent=state.totalAttempted;
}

// ===== DARK MODE =====
function toggleDarkMode(){
state.darkMode=!state.darkMode;
document.body.classList.toggle('light-mode');
updateDMSwitch();
saveState();
}
function updateDMSwitch(){
const sw=document.getElementById('dmSwitch');
if(state.darkMode) sw.classList.add('on'); else sw.classList.remove('on');
}

// ===== SIDEBAR TOGGLE =====
function toggleSidebar(){
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('overlay').classList.toggle('show');
}

// ===== START =====
init();
</script>
</body>
</html>
