<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNS Dashboard - Login</title>
    <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f5;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Student Portal</h2>
        <p>Please log in to access the CNS Dashboard.</p>
        <div data-netlify-identity-menu></div>
    </div>

    <script>
        // Check if the user is already logged in, and redirect them if so
        netlifyIdentity.on('init', user => {
            if (user) {
                window.location.href = "/master-dashboard.html"; // Change this to your actual dashboard page name
            }
        });

        // Redirect the user immediately after a successful login
        netlifyIdentity.on('login', user => {
            window.location.href = "/master-dashboard.html"; // Change this to your actual dashboard page name
        });
    </script>

</body>
</html>
