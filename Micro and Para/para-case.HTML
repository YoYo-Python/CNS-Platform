<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--bg4:#232d42;
--text:#e2e8f0;--text2:#94a3b8;--accent:#38bdf8;--accent2:#818cf8;
--accent3:#a78bfa;--green:#34d399;--red:#f87171;--orange:#fb923c;
--yellow:#fbbf24;--border:#2d3a52;--card:#161e31;
--glow:0 0 20px rgba(56,189,248,0.15);
}
[data-theme="light"]{
--bg:#f0f4f8;--bg2:#ffffff;--bg3:#e8edf4;--bg4:#dce3ed;
--text:#1e293b;--text2:#475569;--accent:#0284c7;--accent2:#4f46e5;
--accent3:#7c3aed;--green:#059669;--red:#dc2626;--orange:#ea580c;
--yellow:#d97706;--border:#cbd5e1;--card:#ffffff;
--glow:0 0 20px rgba(2,132,199,0.1);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:all .3s}
/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
/* Sidebar */
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-header h1{font-size:1rem;color:var(--accent);letter-spacing:1px;margin-bottom:4px}
.sidebar-header .subtitle{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:2px}
.logo-art{margin:10px auto;width:60px;height:60px;position:relative}
.logo-art svg{width:100%;height:100%}
.case-list{flex:1;overflow-y:auto;padding:10px}
.case-item{padding:12px 16px;margin:4px 0;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent;font-size:.85rem}
.case-item:hover{background:var(--bg3);border-color:var(--border)}
.case-item.active{background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(129,140,248,0.1));border-color:var(--accent);box-shadow:var(--glow)}
.case-item .case-num{font-size:.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px}
.case-item .case-title{font-weight:600;font-size:.82rem}
.case-item .case-org{font-size:.72rem;color:var(--accent2);font-style:italic;margin-top:2px}
/* Stats bar in sidebar */
.sidebar-stats{padding:15px;border-top:1px solid var(--border);background:var(--bg3)}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:.75rem}
.stat-label{color:var(--text2)}
.stat-val{font-weight:700;color:var(--accent)}
.streak-val{color:var(--orange)}
/* Dark mode toggle */
.dm-toggle{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:.8rem;color:var(--text2);transition:color .2s}
.dm-toggle:hover{color:var(--accent)}
.dm-toggle .toggle-track{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .3s}
.dm-toggle .toggle-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);position:absolute;top:2px;left:2px;transition:transform .3s}
[data-theme="light"] .toggle-thumb{transform:translateX(16px)}
/* Main content */
.main{margin-left:280px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.top-bar{display:none;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;gap:10px}
.hamburger{background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer}
.mobile-select{flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:.85rem}
/* Tabs */
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 20px}
.tab-btn{padding:14px 20px;background:none;border:none;color:var(--text2);font-size:.82rem;cursor:pointer;position:relative;white-space:nowrap;transition:color .2s;font-weight:500}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:2.5px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
/* Content area */
.content{flex:1;padding:24px;max-width:1000px;width:100%;margin:0 auto}
.tab-content{display:none;animation:fadeSlide .35s ease}
.tab-content.active{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--glow);transition:transform .2s}
.card:hover{transform:translateY(-1px)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.card-icon{font-size:1.3rem}
.card-title{font-weight:700;font-size:.95rem;color:var(--accent)}
/* Patient profile */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.profile-item{background:var(--bg3);padding:12px;border-radius:8px;border-left:3px solid var(--accent)}
.profile-item .pi-label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.profile-item .pi-value{font-size:.88rem;font-weight:600}
/* Lab grid */
.lab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.lab-item{background:var(--bg3);padding:10px 14px;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.lab-name{font-size:.78rem;color:var(--text2)}
.lab-val{font-weight:700;font-size:.88rem}
.lab-val.abnormal{color:var(--red);text-shadow:0 0 8px rgba(248,113,113,0.3)}
.lab-val.normal{color:var(--green)}
/* Tooltip */
.tip{position:relative;cursor:help;border-bottom:1px dashed var(--accent)}
.tip .tip-text{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg4);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.75rem;width:250px;z-index:50;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.3);transition:all .2s;line-height:1.4}
.tip:hover .tip-text{visibility:visible;opacity:1}
/* HPI highlight */
.hpi-text{line-height:1.8;font-size:.88rem;color:var(--text2)}
.hpi-text .hl{color:var(--accent);font-weight:600}
.hpi-text .hl-red{color:var(--red);font-weight:600}
.hpi-text .hl-green{color:var(--green);font-weight:600}
/* Pearl cards */
.pearl{background:var(--bg3);border-radius:10px;padding:16px;margin:8px 0;border-left:4px solid var(--accent2)}
.pearl.red-flag{border-left-color:var(--red)}
.pearl.tip-pearl{border-left-color:var(--green)}
.pearl .pearl-tag{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:700}
.pearl .pearl-tag.exam{color:var(--accent2)}
.pearl .pearl-tag.red{color:var(--red)}
.pearl .pearl-tag.tip{color:var(--green)}
.pearl p{font-size:.84rem;line-height:1.6;color:var(--text2)}
/* Reveal cards */
.reveal-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:10px 0;cursor:pointer;transition:all .3s}
.reveal-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:.85rem}
.reveal-header .arrow{transition:transform .3s;color:var(--accent)}
.reveal-card.open .arrow{transform:rotate(180deg)}
.reveal-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;padding:0 18px}
.reveal-card.open .reveal-body{max-height:600px;padding:4px 18px 18px}
.reveal-body p{font-size:.84rem;line-height:1.7;color:var(--text2)}
/* MCQ */
.mcq-container{margin-bottom:20px}
.mcq-progress{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:12px;background:var(--bg3);border-radius:10px}
.mcq-progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.mcq-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}
.mcq-progress-text{font-size:.75rem;color:var(--text2);white-space:nowrap}
.mcq-score-bar{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.mcq-score-item{background:var(--bg3);padding:10px 16px;border-radius:8px;text-align:center;min-width:80px}
.mcq-score-item .si-val{font-size:1.2rem;font-weight:800}
.mcq-score-item .si-label{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.mcq-score-item.correct .si-val{color:var(--green)}
.mcq-score-item.wrong .si-val{color:var(--red)}
.mcq-score-item.streak .si-val{color:var(--orange)}
.mcq-q{font-size:.9rem;line-height:1.6;margin-bottom:16px;font-weight:500}
.mcq-q .q-num{color:var(--accent);font-weight:700}
.mcq-options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.mcq-opt{padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;font-size:.84rem;line-height:1.5;display:flex;gap:10px;align-items:flex-start}
.mcq-opt:hover:not(.disabled){border-color:var(--accent);background:rgba(56,189,248,0.05)}
.mcq-opt.selected{border-color:var(--accent);background:rgba(56,189,248,0.1)}
.mcq-opt.correct-answer{border-color:var(--green);background:rgba(52,211,153,0.12);animation:correctPop .4s ease}
.mcq-opt.wrong-answer{border-color:var(--red);background:rgba(248,113,113,0.1);animation:shake .4s ease}
.mcq-opt.disabled{cursor:default;opacity:.7}
.mcq-opt.disabled.show-correct{border-color:var(--green);opacity:1;background:rgba(52,211,153,0.08)}
.opt-letter{font-weight:700;color:var(--accent);min-width:20px}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.015)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.mcq-explain{background:var(--bg3);border-radius:10px;padding:14px 18px;margin-top:10px;font-size:.82rem;line-height:1.6;border-left:3px solid var(--green);display:none;animation:fadeSlide .3s ease}
.mcq-explain.show{display:block}
.mcq-explain .exp-label{color:var(--green);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.mcq-nav{display:flex;justify-content:space-between;margin-top:16px}
.mcq-nav-btn{padding:10px 24px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);cursor:pointer;font-size:.82rem;transition:all .2s}
.mcq-nav-btn:hover{border-color:var(--accent);background:var(--bg4)}
.mcq-nav-btn:disabled{opacity:.4;cursor:default}
.mcq-nav-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:600}
/* Mistake review */
.mistake-card{background:var(--bg3);border:1px solid var(--red);border-radius:10px;padding:16px;margin:10px 0;border-left:4px solid var(--red)}
.mistake-card .mk-q{font-size:.84rem;font-weight:600;margin-bottom:8px}
.mistake-card .mk-your{color:var(--red);font-size:.8rem}
.mistake-card .mk-correct{color:var(--green);font-size:.8rem;margin-top:4px}
.mistake-card .mk-exp{color:var(--text2);font-size:.78rem;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
/* Rapid review bullets */
.rapid-list{list-style:none;padding:0}
.rapid-list li{padding:10px 14px;margin:6px 0;background:var(--bg3);border-radius:8px;font-size:.84rem;line-height:1.6;border-left:3px solid var(--accent);position:relative;padding-left:20px}
.rapid-list li::before{content:'⚡';position:absolute;left:-2px;top:50%;transform:translateY(-50%);font-size:.7rem}
/* EKG decoration */
.ekg-line{width:100%;height:40px;margin:10px 0;overflow:hidden;opacity:.3}
.ekg-line svg{width:100%;height:100%}
/* Responsive */
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
.top-bar{display:flex}
.content{padding:16px}
.profile-grid{grid-template-columns:1fr}
.lab-grid{grid-template-columns:1fr 1fr}
.tab-btn{padding:12px 14px;font-size:.78rem}
}
/* Overlay for mobile */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.overlay.show{display:block}
/* Pulse animation for active items */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,0.2)}50%{box-shadow:0 0 0 6px rgba(56,189,248,0)}}
.case-item.active{animation:pulse 2s infinite}
/* Signal wave decorations */
.signal-wave{position:absolute;top:0;right:0;width:120px;height:60px;opacity:.08;pointer-events:none}
</style>

</button>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Find the button
        const logoutBtn = document.getElementById("logout-btn");

        // 2. Attach the click event
        if (logoutBtn) {
          logoutBtn.addEventListener("click", () => {
            // Safety check: ensure Netlify Identity is loaded
            if (window.netlifyIdentity) {
              window.netlifyIdentity.logout();
            } else {
              console.error("Netlify Identity widget is not loaded.");
            }
          });
        }

        // 3. Optional but recommended: Redirect the user after they log out
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("logout", () => {
            // Redirects to the homepage. Change "/" to another URL if needed.
            window.location.href = "/";
          });
        }
      });
</script>

// ========== STATE ==========
let state = {

currentTab: 'casefile',
currentMCQ: 0,
mcqAnswers: {},
mcqScore: { correct: 0, wrong: 0 },
globalScore: parseInt(localStorage.getItem('ps_globalScore') || '0'),
globalStreak: parseInt(localStorage.getItem('ps_streak') || '0'),
currentStreak: parseInt(localStorage.getItem('ps_streak') || '0'),
casesReviewed: JSON.parse(localStorage.getItem('ps_casesReviewed') || '[]'),
darkMode: localStorage.getItem('ps_darkMode') !== 'light'
};

// ========== INIT ==========
function init() {
document.body.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
const saved = localStorage.getItem('ps_lastCase');
if (saved !== null) state.currentCase = parseInt(saved);
renderCaseList();
renderMobileSelect();
loadCase(state.currentCase);
updateGlobalStats();
setupEventListeners();
}

function setupEventListeners() {
document.getElementById('dmToggle').addEventListener('click', toggleDarkMode);
document.getElementById('hamburger').addEventListener('click', () => {
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click', () => {
document.getElementById('sidebar').classList.remove('open');
document.getElementById('overlay').classList.remove('show');
});
document.getElementById('mobileSelect').addEventListener('change', (e) => {
loadCase(parseInt(e.target.value));
});
document.querySelectorAll('.tab-btn').forEach(btn => {
btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
}

function toggleDarkMode() {
state.darkMode = !state.darkMode;
document.body.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
localStorage.setItem('ps_darkMode', state.darkMode ? 'dark' : 'light');
}

function renderCaseList() {
const list = document.getElementById('caseList');
list.innerHTML = cases.map((c, i) => `
<div class="case-item ${i === state.currentCase ? 'active' : ''}" data-idx="${i}" onclick="loadCase(${i})">
<div class="case-num">${c.num}</div>
<div class="case-title">${c.title}</div>
<div class="case-org">${c.organism}</div>
</div>
`).join('');
}

function renderMobileSelect() {
const sel = document.getElementById('mobileSelect');
sel.innerHTML = cases.map((c, i) => `<option value="${i}" ${i === state.currentCase ? 'selected' : ''}>${c.num}: ${c.title}</option>`).join('');
}

function loadCase(idx) {
state.currentCase = idx;
state.currentMCQ = 0;
state.mcqAnswers = {};
state.mcqScore = { correct: 0, wrong: 0 };
localStorage.setItem('ps_lastCase', idx);

if (!state.casesReviewed.includes(idx)) {
state.casesReviewed.push(idx);
localStorage.setItem('ps_casesReviewed', JSON.stringify(state.casesReviewed));
}

document.querySelectorAll('.case-item').forEach((el, i) => el.classList.toggle('active', i === idx));
document.getElementById('mobileSelect').value = idx;

renderAllTabs();
updateGlobalStats();

document.getElementById('sidebar').classList.remove('open');
document.getElementById('overlay').classList.remove('show');
}

function switchTab(tab) {
state.currentTab = tab;
document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
}

function updateGlobalStats() {
document.getElementById('globalScore').textContent = state.globalScore;
document.getElementById('globalStreak').textContent = state.currentStreak;
document.getElementById('casesReviewed').textContent = state.casesReviewed.length + '/' + cases.length;
}

// ========== RENDER ALL TABS ==========
function renderAllTabs() {
const c = cases[state.currentCase];
renderCaseFile(c);
renderPearls(c);
renderReasoning(c);
renderMCQs(c);
renderRapid(c);
}

cls += ' disabled';
if (oi === q.correct) cls += ' correct-answer show-correct';
if (oi === userAnswer && userAnswer !== q.correct) cls += ' wrong-answer';
}
return `<div class="${cls}" onclick="selectAnswer(${oi})" data-oi="${oi}">
<span class="opt-letter">${letters[oi]}.</span>
<span>${opt}</span>
</div>`;
}).join('')}
</div>
<div class="mcq-explain ${answered ? 'show' : ''}" id="mcqExplain">
<div class="exp-label">${answered && userAnswer === q.correct ? '✅ Correct!' : answered ? '❌ Incorrect' : ''} — Explanation</div>
<p>${q.explain}</p>
</div>
<div class="mcq-nav">
<button class="mcq-nav-btn" onclick="prevMCQ()" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
<button class="mcq-nav-btn primary" onclick="nextMCQ()" ${idx === c.mcqs.length - 1 ? 'disabled' : ''}>Next →</button>
</div>
</div>
`;
}

function renderMistakeReview(c) {
const mistakes = Object.entries(state.mcqAnswers).filter(([idx, ans]) => ans !== c.mcqs[idx].correct);
if (mistakes.length === 0) return '';
const letters = ['A', 'B', 'C', 'D'];

return `
<div class="card" style="border-color:var(--red)">
<div class="card-header">
<span class="card-icon">❌</span>
<span class="card-title" style="color:var(--red)">Mistake Review</span>
</div>
${mistakes.map(([idx, ans]) => {
const q = c.mcqs[idx];
return `
<div class="mistake-card">
<div class="mk-q">Q${parseInt(idx)+1}. ${q.q}</div>
<div class="mk-your">Your answer: ${letters[ans]}. ${q.opts[ans]}</div>
<div class="mk-correct">Correct answer: ${letters[q.correct]}. ${q.opts[q.correct]}</div>
<div class="mk-exp">${q.explain}</div>
</div>
`;
}).join('')}
</div>
`;
}

function selectAnswer(oi) {
const c = cases[state.currentCase];
const idx = state.currentMCQ;
if (state.mcqAnswers[idx] !== undefined) return;

state.mcqAnswers[idx] = oi;

if (oi === c.mcqs[idx].correct) {
state.mcqScore.correct++;
state.currentStreak++;
state.globalScore++;
} else {
state.mcqScore.wrong++;
state.currentStreak = 0;
}

localStorage.setItem('ps_globalScore', state.globalScore);
localStorage.setItem('ps_streak', state.currentStreak);
updateGlobalStats();
renderMCQs(c);
}

function nextMCQ() {
const c = cases[state.currentCase];
if (state.currentMCQ < c.mcqs.length - 1) {
state.currentMCQ++;
renderMCQs(c);
}
}

function prevMCQ() {
if (state.currentMCQ > 0) {
state.currentMCQ--;
renderMCQs(cases[state.currentCase]);
}
}

function renderRapid(c) {
const el = document.getElementById('tab-rapid');
el.innerHTML = `
<div class="card">
<div class="card-header">
<span class="card-icon">⚡</span>
<span class="card-title">Rapid Review — ${c.title}</span>
</div>
<ul class="rapid-list">
${c.rapid.map(r => `<li>${r}</li>`).join('')}
</ul>
</div>
<div class="ekg-line"><svg viewBox="0 0 600 40"><path d="M0 20 L60 20 L70 20 L80 6 L90 38 L100 4 L110 34 L120 20 L180 20 L240 20 L250 6 L260 38 L270 4 L280 34 L290 20 L350 20 L410 20 L420 6 L430 38 L440 4 L450 34 L460 20 L520 20 L580 20 L590 20 L600 20" stroke="var(--accent2)" stroke-width="1.5" fill="none"/></svg></div>
`;
}

// ========== BOOT ==========
init();
</script>
</body>
</html>
