<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#1a2232;--bg-card-hover:#212d42;
--text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;
--accent:#06b6d4;--accent-glow:rgba(6,182,212,0.3);--accent-dark:#0891b2;
--success:#10b981;--success-bg:rgba(16,185,129,0.15);
--error:#ef4444;--error-bg:rgba(239,68,68,0.15);
--warning:#f59e0b;--warning-bg:rgba(245,158,11,0.15);
--border:#1e293b;--border-light:#334155;
--gradient-1:linear-gradient(135deg,#06b6d4,#8b5cf6);
--gradient-2:linear-gradient(135deg,#0a0e17,#1a2232);
--shadow-lg:0 20px 40px rgba(0,0,0,0.4);
--shadow-md:0 8px 24px rgba(0,0,0,0.3);
--radius:12px;--radius-sm:8px;--radius-lg:16px;
}
[data-theme="light"]{
--bg-primary:#f1f5f9;--bg-secondary:#ffffff;--bg-card:#ffffff;--bg-card-hover:#f8fafc;
--text-primary:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;
--accent:#0891b2;--accent-glow:rgba(8,145,178,0.2);--accent-dark:#0e7490;
--border:#e2e8f0;--border-light:#cbd5e1;
--gradient-2:linear-gradient(135deg,#f1f5f9,#e2e8f0);
--shadow-lg:0 20px 40px rgba(0,0,0,0.1);--shadow-md:0 8px 24px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
.app-container{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:280px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo-icon{width:40px;height:40px;background:var(--gradient-1);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text{font-size:18px;font-weight:700;background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--text-muted);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* ECG Animation */
.ecg-container{height:40px;margin:16px 0 8px;position:relative;overflow:hidden}
.ecg-line{position:absolute;top:50%;width:200%;height:2px;animation:ecgScroll 4s linear infinite}
.ecg-svg{width:100%;height:40px}
.ecg-path{fill:none;stroke:var(--accent);stroke-width:2;filter:drop-shadow(0 0 4px var(--accent-glow))}

@keyframes ecgScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.case-list{flex:1;overflow-y:auto;padding:12px}
.case-item{padding:14px 16px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:6px;border:1px solid transparent;transition:all .2s;position:relative}
.case-item:hover{background:var(--bg-card-hover);border-color:var(--border-light)}
.case-item.active{background:var(--bg-card);border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.case-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.case-num{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:700;margin-bottom:4px}
.case-title{font-size:14px;font-weight:600;color:var(--text-primary);line-height:1.3}
.case-org{font-size:12px;color:var(--text-muted);margin-top:3px;font-style:italic}

/* Stats bar */
.sidebar-stats{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:12px}
.stat-box{flex:1;text-align:center;padding:8px;background:var(--bg-card);border-radius:var(--radius-sm)}
.stat-val{font-size:18px;font-weight:700;color:var(--accent)}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:2px}

/* Theme toggle */
.theme-toggle{padding:12px 20px;border-top:1px solid var(--border)}
.theme-btn{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.theme-btn:hover{border-color:var(--accent);background:var(--bg-card-hover)}

/* Main Content */
.main-content{flex:1;margin-left:280px;display:flex;flex-direction:column;min-height:100vh}

/* Mobile header */
.mobile-header{display:none;padding:12px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.mobile-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mobile-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text-primary);font-size:13px;max-width:200px}

/* Case Header */
.case-header{padding:28px 32px 20px;background:var(--gradient-2);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.case-header::after{content:'';position:absolute;top:-50%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none;opacity:0.5}
.case-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--accent);color:#fff;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.case-header h1{font-size:24px;font-weight:700;margin-bottom:6px;position:relative}
.case-header .subtitle{font-size:14px;color:var(--text-secondary);position:relative}

/* Tabs */
.tab-bar{display:flex;background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;position:sticky;top:0;z-index:50}
.tab{padding:14px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-icon{font-size:16px}

/* Tab Content */
.tab-content{flex:1;padding:24px 32px 40px;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:border-color .2s}
.card:hover{border-color:var(--border-light)}
.card-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .icon{font-size:20px}

/* Patient Profile Grid */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.profile-item{padding:12px 16px;background:var(--bg-primary);border-radius:var(--radius-sm);border:1px solid var(--border)}
.profile-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:4px}
.profile-value{font-size:15px;font-weight:600}

/* Findings */
.finding{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:8px;border-left:3px solid var(--accent);background:var(--bg-primary);cursor:pointer;position:relative}
.finding.abnormal{border-left-color:var(--error)}
.finding-label{font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.finding-tooltip{display:none;margin-top:8px;padding:10px 12px;background:var(--bg-card-hover);border-radius:var(--radius-sm);font-size:12px;color:var(--text-secondary);line-height:1.5;border:1px solid var(--border)}
.finding.open .finding-tooltip{display:block;animation:fadeUp .2s ease}
.finding-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tag-abnormal{background:var(--error-bg);color:var(--error)}
.tag-normal{background:var(--success-bg);color:var(--success)}

/* Lab Grid */
.lab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.lab-item{padding:14px;background:var(--bg-primary);border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center}
.lab-item.abnormal{border-color:var(--error);background:var(--error-bg)}
.lab-name{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px}
.lab-val{font-size:20px;font-weight:700}
.lab-item.abnormal .lab-val{color:var(--error)}
.lab-ref{font-size:10px;color:var(--text-muted);margin-top:4px}

/* Pearls */
.pearl{padding:16px 20px;background:var(--bg-primary);border-radius:var(--radius-sm);margin-bottom:10px;border:1px solid var(--border);line-height:1.6;font-size:14px}
.pearl-category{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:700;margin-bottom:6px}
.pearl strong{color:var(--accent)}

.red-flag{padding:16px 20px;background:var(--error-bg);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);margin-bottom:10px;font-size:14px;line-height:1.6}
.red-flag-title{font-weight:700;color:var(--error);margin-bottom:4px;display:flex;align-items:center;gap:6px}

/* Reveal Cards */
.reveal-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;transition:all .3s}
.reveal-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .2s}
.reveal-header:hover{background:var(--bg-card-hover)}
.reveal-title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.reveal-arrow{transition:transform .3s;font-size:18px;color:var(--text-muted)}
.reveal-card.open .reveal-arrow{transform:rotate(180deg)}
.reveal-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.reveal-card.open .reveal-body{max-height:600px}
.reveal-inner{padding:0 20px 20px;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.reveal-inner strong{color:var(--accent)}

/* MCQ */
.mcq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.mcq-score{display:flex;gap:16px;align-items:center}
.score-item{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.score-item .num{font-size:20px;font-weight:700}
.score-item.streak .num{color:var(--warning)}
.score-item.correct .num{color:var(--success)}
.score-item.total .num{color:var(--accent)}
.score-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
.mcq-reset{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.mcq-reset:hover{border-color:var(--error);color:var(--error)}

.mcq-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;transition:border-color .3s}
.mcq-card.answered-correct{border-color:var(--success)}
.mcq-card.answered-wrong{border-color:var(--error)}
.mcq-num{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:700;margin-bottom:8px}
.mcq-stem{font-size:15px;line-height:1.6;margin-bottom:16px;font-weight:500}
.mcq-options{display:flex;flex-direction:column;gap:8px}
.mcq-opt{padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;font-size:14px;display:flex;align-items:flex-start;gap:10px}
.mcq-opt:hover:not(.disabled){border-color:var(--accent);background:rgba(6,182,212,0.05)}
.mcq-opt.selected-correct{border-color:var(--success);background:var(--success-bg);cursor:default}
.mcq-opt.selected-wrong{border-color:var(--error);background:var(--error-bg);cursor:default}
.mcq-opt.show-correct{border-color:var(--success);background:var(--success-bg)}
.mcq-opt.disabled{cursor:default;opacity:0.6}
.mcq-opt.disabled.show-correct{opacity:1}
.opt-letter{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .2s}
.mcq-opt.selected-correct .opt-letter{border-color:var(--success);background:var(--success);color:#fff}
.mcq-opt.selected-wrong .opt-letter{border-color:var(--error);background:var(--error);color:#fff}
.mcq-opt.show-correct .opt-letter{border-color:var(--success);background:var(--success);color:#fff}
.mcq-explanation{margin-top:14px;padding:14px 16px;background:var(--bg-primary);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;line-height:1.5;display:none;animation:fadeUp .3s ease}
.mcq-explanation.show{display:block}
.mcq-explanation strong{color:var(--accent)}

/* Rapid Review */
.rapid-section{margin-bottom:20px}
.rapid-title{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.rapid-item{padding:10px 14px;background:var(--bg-primary);border-radius:var(--radius-sm);margin-bottom:6px;font-size:14px;line-height:1.5;border-left:3px solid var(--accent);display:flex;align-items:flex-start;gap:8px}
.rapid-item::before{content:'⚡';flex-shrink:0}
.rapid-item strong{color:var(--accent)}

/* Mistake Review */
.mistake-card{background:var(--error-bg);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px}
.mistake-q{font-size:14px;font-weight:600;margin-bottom:6px}
.mistake-detail{font-size:13px;color:var(--text-secondary);line-height:1.5}
.mistake-detail span{font-weight:700}
.mistake-detail .wrong{color:var(--error)}
.mistake-detail .right{color:var(--success)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* Responsive */
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed}
.sidebar.open{transform:translateX(0)}
.main-content{margin-left:0}
.mobile-header{display:flex}
.case-header{padding:20px 16px}
.case-header h1{font-size:20px}
.tab-bar{padding:0 12px}
.tab{padding:12px 14px;font-size:12px}
.tab-content{padding:16px}
.profile-grid{grid-template-columns:1fr 1fr}
.lab-grid{grid-template-columns:1fr 1fr}
.mcq-header{flex-direction:column;align-items:flex-start}
.mcq-score{flex-wrap:wrap}
}

/* Pulse animation for logo */
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* Neural network background */
.neural-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.03}
</style>

<button id="logout-btn"
  style="position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 10px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 30px; font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4); letter-spacing: 0.5px;">
  Log Out
</button>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Find the button
        const logoutBtn = document.getElementById("logout-btn");

        // 2. Attach the click event
        if (logoutBtn) {
          logoutBtn.addEventListener("click", () => {
            // Safety check: ensure Netlify Identity is loaded
            if (window.netlifyIdentity) {
              window.netlifyIdentity.logout();
            } else {
              console.error("Netlify Identity widget is not loaded.");
            }
          });
        }

        // 3. Optional but recommended: Redirect the user after they log out
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("logout", () => {
            // Redirects to the homepage. Change "/" to another URL if needed.
            window.location.href = "/";
          });
        }
      });
</script>

<script>
// ==================== DATA ====================
const cases = [
{
id: 0,

// ==================== STATE ====================
let currentCase = parseInt(localStorage.getItem('lastCase')) || 0;
let currentTab = 'casefile';
let globalScore = parseInt(localStorage.getItem('globalScore')) || 0;
let globalStreak = parseInt(localStorage.getItem('globalStreak')) || 0;
let answeredMCQs = JSON.parse(localStorage.getItem('answeredMCQs') || '{}');
let mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');

// ==================== INIT ====================
function init() {
loadTheme();
renderCaseList();
renderMobileSelect();
selectCase(currentCase);
updateGlobalStats();
}

function loadTheme() {
const theme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : '');
updateThemeBtn(theme);
}

function toggleTheme() {
const current = localStorage.getItem('theme') || 'dark';
const next = current === 'dark' ? 'light' : 'dark';
localStorage.setItem('theme', next);
if (next === 'light') {
document.documentElement.setAttribute('data-theme', 'light');
} else {
document.documentElement.removeAttribute('data-theme');
}
updateThemeBtn(next);
}

function updateThemeBtn(theme) {
const icon = theme === 'light' ? '☀️' : '🌙';
const text = theme === 'light' ? 'Light Mode' : 'Dark Mode';
document.getElementById('themeIcon').textContent = icon;
document.getElementById('themeText').textContent = text;
const icon2 = document.getElementById('themeIcon2');
if (icon2) icon2.textContent = icon;
}

// ==================== CASE LIST ====================
function renderCaseList() {
const list = document.getElementById('caseList');
list.innerHTML = cases.map((c, i) => `
<div class="case-item ${i === currentCase ? 'active' : ''}" onclick="selectCase(${i})">
<div class="case-num">${c.num}</div>
<div class="case-title">${c.title}</div>
<div class="case-org">${c.organism}</div>
</div>
`).join('');
}

function renderMobileSelect() {
const sel = document.getElementById('mobileSelect');
sel.innerHTML = cases.map((c, i) => `<option value="${i}" ${i === currentCase ? 'selected' : ''}>${c.num}: ${c.title}</option>`).join('');
}

function selectCase(idx) {
currentCase = idx;
localStorage.setItem('lastCase', idx);
renderCaseList();
document.getElementById('mobileSelect').value = idx;
renderCaseHeader();
switchTab(currentTab);
}

function renderCaseHeader() {
const c = cases[currentCase];
document.getElementById('caseHeader').innerHTML = `
<div class="case-badge">${c.badge}</div>
<h1>${c.title}</h1>
<div class="subtitle">${c.organism} — ${c.patient.age}yo ${c.patient.sex}, ${c.patient.occupation}</div>
`;
}

// ==================== TABS ====================
function switchTab(tab) {
currentTab = tab;
document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
const content = document.getElementById('tabContent');
content.style.animation = 'none';
content.offsetHeight;
content.style.animation = 'fadeUp .35s ease';

switch(tab) {
case 'casefile': renderCaseFile(); break;
case 'pearls': renderPearls(); break;
case 'reasoning': renderReasoning(); break;
case 'mcq': renderMCQ(); break;
case 'rapid': renderRapid(); break;
}
}

// ==================== MCQ ====================
function renderMCQ() {
const c = cases[currentCase];
const caseKey = `case_${currentCase}`;
const answered = answeredMCQs[caseKey] || {};
const caseMistakes = mistakes.filter(m => m.caseId === currentCase);

let correctCount = 0;
let totalAnswered = 0;
Object.values(answered).forEach(a => {
totalAnswered++;
if (a.correct) correctCount++;
});

document.getElementById('tabContent').innerHTML = `
<div class="mcq-header">
<div class="mcq-score">
<div class="score-item correct">
<div class="num">${correctCount}</div>
<div class="score-label">Correct</div>
</div>
<div class="score-item total">
<div class="num">${totalAnswered}/${c.mcqs.length}</div>
<div class="score-label">Answered</div>
</div>
<div class="score-item streak">
<div class="num">${globalStreak}🔥</div>
<div class="score-label">Streak</div>
</div>
</div>
<button class="mcq-reset" onclick="resetCaseMCQs()">↻ Reset This Case</button>
</div>

${c.mcqs.map((q, i) => {
const ans = answered[i];
const isAnswered = ans !== undefined;
return `
<div class="mcq-card ${isAnswered ? (ans.correct ? 'answered-correct' : 'answered-wrong') : ''}" id="mcq-card-${i}">
<div class="mcq-num">Question ${i + 1} of ${c.mcqs.length}</div>
<div class="mcq-stem">${q.stem}</div>
<div class="mcq-options">
${q.options.map((opt, oi) => {
let cls = '';
if (isAnswered) {
cls = 'disabled';
if (oi === q.correct) cls += ' show-correct';
if (oi === ans.selected && !ans.correct) cls += ' selected-wrong';
if (oi === ans.selected && ans.correct) cls += ' selected-correct';
}
return `<div class="mcq-opt ${cls}" onclick="answerMCQ(${i}, ${oi})" id="mcq-${i}-opt-${oi}">
<div class="opt-letter">${String.fromCharCode(65 + oi)}</div>
<div>${opt}</div>
</div>`;
}).join('')}
</div>
<div class="mcq-explanation ${isAnswered ? 'show' : ''}" id="mcq-exp-${i}">
${isAnswered ? (ans.correct ? '✅' : '❌') + ' ' + q.explanation : ''}
</div>
</div>
`;
}).join('')}

${caseMistakes.length > 0 ? `
<div class="card" style="margin-top:24px">
<div class="card-title"><span class="icon">❌</span> Mistake Review</div>
${caseMistakes.map(m => `
<div class="mistake-card">
<div class="mistake-q">Q${m.qIndex + 1}: ${m.stem.substring(0, 80)}...</div>
<div class="mistake-detail">
Your answer: <span class="wrong">${m.yourAnswer}</span><br>
Correct answer: <span class="right">${m.correctAnswer}</span>
</div>
</div>
`).join('')}
</div>
` : ''}
`;
}

function answerMCQ(qIdx, optIdx) {
const caseKey = `case_${currentCase}`;
if (!answeredMCQs[caseKey]) answeredMCQs[caseKey] = {};
if (answeredMCQs[caseKey][qIdx] !== undefined) return;

const c = cases[currentCase];
const q = c.mcqs[qIdx];
const isCorrect = optIdx === q.correct;

answeredMCQs[caseKey][qIdx] = { selected: optIdx, correct: isCorrect };

if (isCorrect) {
globalScore++;
globalStreak++;
} else {
globalStreak = 0;
mistakes.push({
caseId: currentCase,
qIndex: qIdx,
stem: q.stem,
yourAnswer: q.options[optIdx],
correctAnswer: q.options[q.correct]
});
}

localStorage.setItem('answeredMCQs', JSON.stringify(answeredMCQs));
localStorage.setItem('globalScore', globalScore);
localStorage.setItem('globalStreak', globalStreak);
localStorage.setItem('mistakes', JSON.stringify(mistakes));
updateGlobalStats();

// Update UI
const card = document.getElementById(`mcq-card-${qIdx}`);
card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

q.options.forEach((_, oi) => {
const el = document.getElementById(`mcq-${qIdx}-opt-${oi}`);
el.classList.add('disabled');
if (oi === q.correct) el.classList.add('show-correct');
if (oi === optIdx && !isCorrect) el.classList.add('selected-wrong');
if (oi === optIdx && isCorrect) el.classList.add('selected-correct');
});

const exp = document.getElementById(`mcq-exp-${qIdx}`);
exp.innerHTML = (isCorrect ? '✅ ' : '❌ ') + q.explanation;
exp.classList.add('show');

// Animate
card.style.transform = 'scale(1.01)';
setTimeout(() => card.style.transform = '', 200);
}

function resetCaseMCQs() {
const caseKey = `case_${currentCase}`;
delete answeredMCQs[caseKey];

// Recalculate global score
let total = 0;
Object.values(answeredMCQs).forEach(caseAnswers => {
Object.values(caseAnswers).forEach(a => {
if (a.correct) total++;
});
});
globalScore = total;
globalStreak = 0;

mistakes = mistakes.filter(m => m.caseId !== currentCase);

localStorage.setItem('answeredMCQs', JSON.stringify(answeredMCQs));
localStorage.setItem('globalScore', globalScore);
localStorage.setItem('globalStreak', globalStreak);
localStorage.setItem('mistakes', JSON.stringify(mistakes));
updateGlobalStats();
renderMCQ();
}

// ==================== NEURAL CANVAS ====================
function initCanvas() {
const canvas = document.getElementById('neuralCanvas');
const ctx = canvas.getContext('2d');
let w, h, nodes = [];

function resize() {
w = canvas.width = window.innerWidth;
h = canvas.height = window.innerHeight;
}

function createNodes() {
nodes = [];
const count = Math.floor((w * h) / 25000);
for (let i = 0; i < count; i++) {
nodes.push({
x: Math.random() * w,
y: Math.random() * h,
vx: (Math.random() - 0.5) * 0.3,
vy: (Math.random() - 0.5) * 0.3,
r: Math.random() * 2 + 1
});
}
}

function draw() {
ctx.clearRect(0, 0, w, h);
nodes.forEach(n => {
n.x += n.vx;
n.y += n.vy;
if (n.x < 0 || n.x > w) n.vx *= -1;
if (n.y < 0 || n.y > h) n.vy *= -1;
ctx.beginPath();
ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
ctx.fillStyle = '#06b6d4';
ctx.fill();
});

for (let i = 0; i < nodes.length; i++) {
for (let j = i + 1; j < nodes.length; j++) {
const dx = nodes[i].x - nodes[j].x;
const dy = nodes[i].y - nodes[j].y;
const dist = Math.sqrt(dx * dx + dy * dy);
if (dist < 120) {
ctx.beginPath();
ctx.moveTo(nodes[i].x, nodes[i].y);
ctx.lineTo(nodes[j].x, nodes[j].y);
ctx.strokeStyle = `rgba(6,182,212,${1 - dist / 120})`;
ctx.lineWidth = 0.5;
ctx.stroke();
}
}
}
requestAnimationFrame(draw);
}

resize();
createNodes();
draw();
window.addEventListener('resize', () => { resize(); createNodes(); });
}

// ==================== START ====================
window.addEventListener('DOMContentLoaded', () => {
init();
initCanvas();
});
</script>
