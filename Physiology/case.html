<title>Physiology Case Library</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--bg4:#232d45;
--text:#e2e8f0;--text2:#94a3b8;--accent:#06b6d4;--accent2:#0891b2;
--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;
--border:#1e293b;--card:#0f172a;--glass:rgba(6,182,212,0.08);
--success-bg:rgba(16,185,129,0.12);--error-bg:rgba(239,68,68,0.12);
}
.light{
--bg:#f0f4f8;--bg2:#ffffff;--bg3:#e8edf3;--bg4:#dde3ec;
--text:#1e293b;--text2:#475569;--accent:#0891b2;--accent2:#06b6d4;
--green:#059669;--red:#dc2626;--yellow:#d97706;--purple:#7c3aed;
--border:#cbd5e1;--card:#ffffff;--glass:rgba(8,145,178,0.06);
--success-bg:rgba(5,150,105,0.1);--error-bg:rgba(220,38,38,0.1);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;transition:all .3s}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-header h1{font-size:16px;color:var(--accent);letter-spacing:1px;margin-bottom:4px}
.sidebar-header .subtitle{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:2px}
.ecg-line{height:40px;margin:12px 0;position:relative;overflow:hidden}
.ecg-line svg{width:100%;height:100%}
.ecg-line path{stroke:var(--accent);stroke-width:2;fill:none;stroke-dasharray:400;stroke-dashoffset:400;animation:ecgDraw 3s linear infinite}
@keyframes ecgDraw{0%{stroke-dashoffset:400}100%{stroke-dashoffset:0}}
.case-list{flex:1;overflow-y:auto;padding:10px}
.case-item{padding:14px 16px;border-radius:10px;cursor:pointer;margin-bottom:6px;transition:all .2s;border:1px solid transparent;display:flex;align-items:center;gap:12px}
.case-item:hover{background:var(--glass);border-color:var(--accent)}
.case-item.active{background:var(--glass);border-color:var(--accent);box-shadow:0 0 20px rgba(6,182,212,0.15)}
.case-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.case-item-text h3{font-size:13px;font-weight:600;margin-bottom:2px}
.case-item-text p{font-size:11px;color:var(--text2)}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;justify-content:space-between}
.stats-badge{background:var(--bg3);padding:6px 12px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:4px}
.theme-toggle{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);background:var(--glass)}
.main{margin-left:280px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.mobile-header{display:none;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;gap:12px}
.mobile-select{flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;appearance:none;cursor:pointer}
.mobile-select option{background:var(--bg2);color:var(--text)}
.case-header{padding:30px 40px 0;position:relative;overflow:hidden}
.case-header::before{content:'';position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(135deg,rgba(6,182,212,0.08),rgba(139,92,246,0.05));pointer-events:none}
.case-badge{display:inline-flex;align-items:center;gap:6px;background:var(--glass);border:1px solid rgba(6,182,212,0.2);padding:5px 14px;border-radius:20px;font-size:11px;color:var(--accent);margin-bottom:12px;position:relative}
.case-title{font-size:28px;font-weight:700;margin-bottom:6px;position:relative}
.case-subtitle{font-size:14px;color:var(--text2);position:relative;max-width:600px;line-height:1.5}
.tab-bar{display:flex;gap:4px;padding:20px 40px 0;position:relative;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 20px;border-radius:10px 10px 0 0;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap;position:relative;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--text);background:var(--glass)}
.tab-btn.active{color:var(--accent);background:var(--bg3);font-weight:600}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px}
.tab-content{flex:1;padding:24px 40px 40px}
.content-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;transition:all .3s}
.content-card:hover{border-color:rgba(6,182,212,0.2)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.card-header h3{font-size:16px;font-weight:600}
.card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.profile-item{background:var(--bg3);padding:14px;border-radius:10px;border:1px solid var(--border)}
.profile-item label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);display:block;margin-bottom:4px}
.profile-item span{font-size:14px;font-weight:600}
.finding-tag{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;font-size:12px;margin:3px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg3)}
.finding-tag.abnormal{background:var(--error-bg);border-color:rgba(239,68,68,0.3);color:var(--red)}
.finding-tag.normal{background:var(--success-bg);border-color:rgba(16,185,129,0.3);color:var(--green)}
.finding-tag:hover{transform:translateY(-1px)}
.tooltip-popup{position:fixed;background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:12px 16px;font-size:12px;max-width:280px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,0.4);pointer-events:none;line-height:1.5}
.pearl-card{background:var(--bg3);border-left:3px solid var(--accent);padding:16px 20px;border-radius:0 10px 10px 0;margin-bottom:12px;font-size:13px;line-height:1.7}
.pearl-card strong{color:var(--accent)}
.pearl-card.red-flag{border-left-color:var(--red)}
.pearl-card.red-flag strong{color:var(--red)}
.reveal-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:all .3s}
.reveal-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;transition:background .2s}
.reveal-header:hover{background:var(--glass)}
.reveal-header h4{font-size:14px;display:flex;align-items:center;gap:8px}
.reveal-arrow{transition:transform .3s;font-size:12px}
.reveal-card.open .reveal-arrow{transform:rotate(180deg)}
.reveal-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.reveal-card.open .reveal-body{max-height:500px}
.reveal-body-inner{padding:0 20px 16px;font-size:13px;line-height:1.7;color:var(--text2)}
.mcq-container{margin-bottom:20px}
.mcq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.score-display{display:flex;gap:16px;align-items:center}
.score-item{background:var(--bg3);padding:8px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:6px}
.mcq-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;transition:all .3s}
.mcq-stem{font-size:14px;line-height:1.7;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.mcq-stem .q-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;margin-right:10px}
.mcq-options{display:flex;flex-direction:column;gap:8px}
.mcq-option{padding:14px 18px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;font-size:13px;display:flex;align-items:flex-start;gap:10px;background:var(--bg3)}
.mcq-option:hover:not(.disabled){border-color:var(--accent);background:var(--glass)}
.mcq-option .opt-letter{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg4);flex-shrink:0;transition:all .2s}
.mcq-option.correct{border-color:var(--green);background:var(--success-bg)}
.mcq-option.correct .opt-letter{background:var(--green);color:#fff}
.mcq-option.wrong{border-color:var(--red);background:var(--error-bg)}
.mcq-option.wrong .opt-letter{background:var(--red);color:#fff}
.mcq-option.disabled{cursor:default;opacity:.7}
.mcq-option.disabled.correct{opacity:1}
.mcq-explain{margin-top:12px;padding:14px 18px;border-radius:10px;font-size:12px;line-height:1.6;display:none;animation:slideIn .3s}
.mcq-explain.show{display:block}
.mcq-explain.correct-exp{background:var(--success-bg);border:1px solid rgba(16,185,129,0.3)}
.mcq-explain.wrong-exp{background:var(--error-bg);border:1px solid rgba(239,68,68,0.3)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.rapid-list{list-style:none}
.rapid-list li{padding:10px 14px;border-left:2px solid var(--accent);margin-bottom:8px;font-size:13px;line-height:1.6;background:var(--bg3);border-radius:0 8px 8px 0}
.rapid-list li strong{color:var(--accent)}
.mistakes-section{margin-top:20px}
.mistake-item{background:var(--error-bg);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:14px 18px;margin-bottom:8px;font-size:12px}
.mistake-item .m-q{font-weight:600;margin-bottom:4px}
.mistake-item .m-a{color:var(--red)}
.mistake-item .m-c{color:var(--green)}
.reset-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12px;transition:all .2s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}
.nerve-signal{position:fixed;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;animation:nervePulse 4s infinite;pointer-events:none;z-index:0}
@keyframes nervePulse{0%,100%{opacity:0;transform:translateX(-100%)}50%{opacity:.5;transform:translateX(100%)}}
.membrane-bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:-1;opacity:.03}
.membrane-bg::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,var(--accent) 40px,var(--accent) 41px)}
@media(max-width:900px){
.sidebar{transform:translateX(-100%)}
.main{margin-left:0}
.mobile-header{display:flex}
.case-header{padding:20px 16px 0}
.tab-bar{padding:16px 16px 0}
.tab-content{padding:16px}
.case-title{font-size:22px}
.tab-btn{padding:8px 14px;font-size:12px}
}
@media(max-width:500px){
.profile-grid{grid-template-columns:1fr}
.score-display{flex-wrap:wrap}
}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
</style>

</button>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Find the button
        const logoutBtn = document.getElementById("logout-btn");

        // 2. Attach the click event
        if (logoutBtn) {
          logoutBtn.addEventListener("click", () => {
            // Safety check: ensure Netlify Identity is loaded
            if (window.netlifyIdentity) {
              window.netlifyIdentity.logout();
            } else {
              console.error("Netlify Identity widget is not loaded.");
            }
          });
        }

        // 3. Optional but recommended: Redirect the user after they log out
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("logout", () => {
            // Redirects to the homepage. Change "/" to another URL if needed.
            window.location.href = "/";
          });
        }
      });
</script>

<script>
const CASES = [
{
id: 0,
icon: "🧠",
color: "#06b6d4",
badge: "CASE 1 — NEUROPHYSIOLOGY",
title: "Cerebellar Ataxia",
subtitle: "A 65-year-old man involved in a motor vehicle accident is hospitalized and evaluated by a neurologist for poor balance.",
patient: {
age: "65 years", gender: "Male", occupation: "Retired",
complaint: "Poor balance after MVA",
history: "Motor vehicle accident"
},
findings: [

{ text: "Staccato speech", abnormal: true, tip: "Slow, slurred, scanning speech due to uncoordinated speech muscles." },
{ text: "Hypotonia (affected side)", abnormal: true, tip: "Decreased facilitatory cerebellar output to spinal cord reduces muscle tone." },
{ text: "Intact sensory pathways", abnormal: false, tip: "Dorsal columns and spinothalamic tracts are functioning normally." },
{ text: "Left cerebellar hemisphere lesion (MRI)", abnormal: true, tip: "Cerebellar lesions cause ipsilateral signs — damage on the left affects the left side." }
],
labs: [
{ label: "MRI Brain", value: "Left cerebellar hemisphere lesion", abnormal: true },
{ label: "Sensory exam", value: "Intact", abnormal: false },
{ label: "Deep tendon reflexes", value: "Pendular knee jerk", abnormal: true },
{ label: "Romberg test", value: "Negative", abnormal: true },
{ label: "Gait", value: "Staggering / drunken", abnormal: true }
],
pearls: [
{ text: "<strong>Romberg Test Rule:</strong> Positive Romberg = sensory ataxia (dorsal column). Negative Romberg = cerebellar (motor) ataxia. Motor ataxia is NOT corrected by vision.", flag: false },
{ text: "<strong>Pendular Knee Jerk:</strong> Cerebellar lesions decrease facilitatory signals → hypotonia → the leg swings freely like a pendulum with no muscle resistance to brake it.", flag: false },
{ text: "<strong>The Three Ds of Cerebellum:</strong> Dysmetria, Dysdiadochokinesia, Drunken gait. Plus: intention tremor, nystagmus, hypotonia.", flag: false },
{ text: "<strong>Ipsilateral Signs:</strong> Cerebellar hemisphere lesions produce signs on the SAME side as the lesion (unlike cortical lesions).", flag: false },
{ text: "<strong>🚨 Common Trap:</strong> Do NOT confuse cerebellar intention tremor (worsens with movement) with Parkinson's resting tremor (present at rest, disappears with movement).", flag: true },

],
reasoning: [
{ title: "🔬 Altered Physiology", body: "The cerebellum normally coordinates movement planning (via corticopontocerebellar pathway) and provides error correction during execution. Damage disrupts the feedforward and feedback loops that smooth voluntary movements." },
{ title: "⚙️ Pathophysiology Mechanism", body: "Lesion in the left cerebellar hemisphere → loss of ipsilateral motor coordination → intention tremor, dysmetria, dysdiadochokinesia. Loss of facilitatory output → hypotonia and pendular reflexes. Vestibulocerebellar disruption → nystagmus and postural instability." },

},
{
stem: "A patient is asked to rapidly alternate between supinating and pronating their hands but is unable to do so smoothly. This clinical sign is defined as:",

correct: 2,
explain: "Dysdiadochokinesia = inability to perform rapid alternating movements — hallmark of cerebellar dysfunction."
},
{
stem: "Unlike a patient with sensory ataxia, a patient with cerebellar ataxia will exhibit which of the following?",
options: ["Improvement in coordination with visual feedback", "A high-stepping, stamping gait", "Poor balance regardless of visual input", "Absent deep tendon reflexes"],
correct: 2,
explain: "Motor ataxia = defect in movement execution. Visual input does NOT correct the staggering gait or balance issues."
},
{
stem: "A cerebellar lesion on the left side would produce motor signs on which side of the body?",
options: ["Right side (contralateral)", "Left side (ipsilateral)", "Bilateral equally", "Depends on the tract involved"],
correct: 1,
explain: "Cerebellar hemisphere lesions produce IPSILATERAL signs because cerebellar output crosses twice (double decussation)."
},

function selectCase(id) {
id = parseInt(id);
state.currentCase = id;

state.lastCase = id;
saveState();
renderAll();

function selectTab(idx) {
state.currentTab = idx;

document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i === idx));

function initScores(caseId) {
if (!state.scores[caseId]) state.scores[caseId] = { correct: 0, total: 0, answered: {} };
if (!state.streaks[caseId]) state.streaks[caseId] = 0;
if (!state.mistakes[caseId]) state.mistakes[caseId] = [];
}

function getGlobalStats() {
let totalCorrect = 0, totalAnswered = 0, maxStreak = 0;
Object.values(state.scores).forEach(s => { totalCorrect += s.correct; totalAnswered += s.total; });
Object.values(state.streaks).forEach(s => { if (s > maxStreak) maxStreak = s; });
return { totalCorrect, totalAnswered, maxStreak };
}

sel.innerHTML = CASES.map(c => `<option value="${c.id}" ${state.currentCase === c.id ? 'selected' : ''}>${c.icon} ${c.title}</option>`).join('');

const gs = getGlobalStats();
document.getElementById('globalStats').innerHTML = `🔥 ${gs.maxStreak} | ✅ ${gs.totalCorrect}/${gs.totalAnswered}`;
}

function renderHeader() {
const c = CASES[state.currentCase];
document.getElementById('caseHeader').innerHTML = `
<div class="case-badge">${c.badge}</div>
<div class="case-title">${c.icon} ${c.title}</div>
<div class="case-subtitle">${c.subtitle}</div>
`;
}

const TABS = [
{ icon: '📂', label: 'Case File' },
{ icon: '💡', label: 'Physio Pearls' },
{ icon: '🔍', label: 'Clinical Reasoning' },
{ icon: '📝', label: 'Exam MCQs' },
{ icon: '⚡', label: 'Rapid Review' }
];

function renderTabs() {
document.getElementById('tabBar').innerHTML = TABS.map((t,i) => `
<button class="tab-btn ${state.currentTab === i ? 'active' : ''}" onclick="selectTab(${i})">${t.icon} ${t.label}</button>
`).join('');
}

function renderTabContent() {
const container = document.getElementById('tabContent');
container.className = 'tab-content fade-in';
const c = CASES[state.currentCase];
initScores(c.id);

switch(state.currentTab) {
case 0: renderCaseFile(container, c); break;
case 1: renderPearls(container, c); break;
case 2: renderReasoning(container, c); break;
case 3: renderMCQs(container, c); break;
case 4: renderRapid(container, c); break;
}
}

function renderCaseFile(el, c) {
const p = c.patient;
el.innerHTML = `
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:${c.color}22;color:${c.color}">👤</div>
<h3>Patient Profile</h3>
</div>
<div class="profile-grid">
<div class="profile-item"><label>Age</label><span>${p.age}</span></div>
<div class="profile-item"><label>Gender</label><span>${p.gender}</span></div>
<div class="profile-item"><label>Occupation</label><span>${p.occupation}</span></div>
<div class="profile-item"><label>Chief Complaint</label><span>${p.complaint}</span></div>
<div class="profile-item"><label>History</label><span>${p.history}</span></div>
</div>
</div>
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:#f59e0b22;color:#f59e0b">🔎</div>
<h3>Key Findings <span style="font-size:11px;color:var(--text2);font-weight:400">(hover/tap for explanation)</span></h3>
</div>
<div style="display:flex;flex-wrap:wrap;gap:4px">
${c.findings.map((f,i) => `<span class="finding-tag ${f.abnormal ? 'abnormal' : 'normal'}" data-tip="${f.tip}" onmouseenter="showTip(event)" onmouseleave="hideTip()" ontouchstart="showTip(event)">${f.abnormal ? '⚠️' : '✅'} ${f.text}</span>`).join('')}
</div>
</div>
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:#8b5cf622;color:#8b5cf6">📊</div>
<h3>Investigations & Results</h3>
</div>
<div class="profile-grid">
${c.labs.map(l => `<div class="profile-item" style="${l.abnormal ? 'border-color:rgba(239,68,68,0.4)' : ''}"><label>${l.label}</label><span style="${l.abnormal ? 'color:var(--red)' : 'color:var(--green)'}">${l.value}</span></div>`).join('')}
</div>
</div>
`;
}

function showTip(e) {
const tip = e.target.getAttribute('data-tip');
if (!tip) return;
const tt = document.getElementById('tooltip');
tt.textContent = tip;
tt.style.display = 'block';
const rect = e.target.getBoundingClientRect();
let left = rect.left;
let top = rect.bottom + 8;
if (left + 280 > window.innerWidth) left = window.innerWidth - 290;
if (left < 10) left = 10;
if (top + 100 > window.innerHeight) top = rect.top - 80;
tt.style.left = left + 'px';
tt.style.top = top + 'px';
}

function hideTip() {
document.getElementById('tooltip').style.display = 'none';
}

function renderPearls(el, c) {
el.innerHTML = `
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:#06b6d422;color:#06b6d4">💡</div>
<h3>Physiology Pearls & Exam Tips</h3>
</div>
${c.pearls.filter(p => !p.flag).map(p => `<div class="pearl-card">${p.text}</div>`).join('')}
</div>
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:#ef444422;color:#ef4444">🚨</div>
<h3>Red Flags & Common Traps</h3>
</div>
${c.pearls.filter(p => p.flag).map(p => `<div class="pearl-card red-flag">${p.text}</div>`).join('')}
</div>
`;
}

function renderReasoning(el, c) {
el.innerHTML = `
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:#10b98122;color:#10b981">🔍</div>
<h3>Clinical Reasoning (tap to reveal)</h3>
</div>
${c.reasoning.map((r,i) => `
<div class="reveal-card" id="reveal-${i}" onclick="toggleReveal(${i})">
<div class="reveal-header">
<h4>${r.title}</h4>
<span class="reveal-arrow">▼</span>
</div>
<div class="reveal-body">
<div class="reveal-body-inner">${r.body}</div>
</div>
</div>
`).join('')}
</div>
`;
}

function toggleReveal(i) {
document.getElementById('reveal-' + i).classList.toggle('open');
}

function renderMCQs(el, c) {
const sc = state.scores[c.id];
const streak = state.streaks[c.id];
const mistakes = state.mistakes[c.id] || [];

el.innerHTML = `
<div class="mcq-container">
<div class="mcq-header">
<h3>📝 Exam MCQs (${c.mcqs.length} Questions)</h3>
<div class="score-display">
<div class="score-item">✅ ${sc.correct}/${sc.total}</div>
<div class="score-item">🔥 Streak: ${streak}</div>
<div class="score-item" style="cursor:pointer" onclick="resetCase(${c.id})">🔄 Reset</div>
</div>
</div>
${c.mcqs.map((q,qi) => renderMCQ(q, qi, c.id)).join('')}
${mistakes.length > 0 ? `
<div class="mistakes-section">
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:#ef444422;color:#ef4444">❌</div>
<h3>Mistake Review</h3>
</div>
${mistakes.map(m => `
<div class="mistake-item">
<div class="m-q">Q${m.qNum + 1}: ${m.stem.substring(0, 80)}...</div>
<div class="m-a">Your answer: ${m.yourAnswer}</div>
<div class="m-c">Correct: ${m.correctAnswer}</div>
</div>
`).join('')}
</div>
</div>
` : ''}
</div>
`;
}

function renderMCQ(q, qi, caseId) {
const sc = state.scores[caseId];
const answered = sc.answered[qi] !== undefined;
const userAns = sc.answered[qi];
const letters = ['A','B','C','D'];

return `
<div class="mcq-card">
<div class="mcq-stem"><span class="q-num">${qi + 1}</span>${q.stem}</div>
<div class="mcq-options">
${q.options.map((o,oi) => {
let cls = 'mcq-option';
if (answered) {
cls += ' disabled';
if (oi === q.correct) cls += ' correct';
else if (oi === userAns && userAns !== q.correct) cls += ' wrong';
}
return `<div class="${cls}" onclick="${answered ? '' : `answerMCQ(${caseId},${qi},${oi})`}">
<span class="opt-letter">${letters[oi]}</span>
<span>${o}</span>
</div>`;
}).join('')}
</div>
<div class="mcq-explain ${answered ? 'show' : ''} ${answered ? (userAns === q.correct ? 'correct-exp' : 'wrong-exp') : ''}">
${answered ? (userAns === q.correct ? '✅ Correct! ' : '❌ Incorrect. ') + q.explain : ''}
</div>
</div>
`;
}

function answerMCQ(caseId, qi, oi) {
const sc = state.scores[caseId];
if (sc.answered[qi] !== undefined) return;

const q = CASES[caseId].mcqs[qi];
sc.answered[qi] = oi;
sc.total++;

if (oi === q.correct) {
sc.correct++;
state.streaks[caseId]++;
} else {
state.streaks[caseId] = 0;
if (!state.mistakes[caseId]) state.mistakes[caseId] = [];
const letters = ['A','B','C','D'];
state.mistakes[caseId].push({
qNum: qi,
stem: q.stem,
yourAnswer: letters[oi] + '. ' + q.options[oi],
correctAnswer: letters[q.correct] + '. ' + q.options[q.correct]
});
}

saveState();
renderMCQs(document.getElementById('tabContent'), CASES[caseId]);
renderSidebar();
}

function resetCase(caseId) {
state.scores[caseId] = { correct: 0, total: 0, answered: {} };
state.streaks[caseId] = 0;
state.mistakes[caseId] = [];
saveState();
renderMCQs(document.getElementById('tabContent'), CASES[caseId]);
renderSidebar();
}

function renderRapid(el, c) {
el.innerHTML = `
<div class="content-card">
<div class="card-header">
<div class="card-icon" style="background:#f59e0b22;color:#f59e0b">⚡</div>
<h3>Rapid Revision — ${c.title}</h3>
</div>
<ul class="rapid-list">
${c.rapid.map(r => `<li>${r}</li>`).join('')}
</ul>
</div>
`;
}

function renderAll() {
renderSidebar();
renderHeader();
renderTabs();
renderTabContent();
}

// Init
loadState();
if (!state.darkMode) document.body.classList.add('light');
document.getElementById('themeToggle').textContent = state.darkMode ? '🌙' : '☀️';
document.getElementById('mobileTheme').textContent = state.darkMode ? '🌙' : '☀️';
if (state.lastCase !== undefined) state.currentCase = state.lastCase;
renderAll();

// Close tooltip on scroll/click elsewhere
document.addEventListener('click', (e) => {
if (!e.target.classList.contains('finding-tag')) hideTip();
});
document.addEventListener('scroll', hideTip, true);
</script>
</body>
</html>
